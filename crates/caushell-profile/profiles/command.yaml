dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: command
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families:
    - bourne
    - bash
    - sh
    - dash
  requires_features: []

forms:
  - id: wrapped_command
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-v"
              - kind: has_flag
                flag: "-V"
    parameters:
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment: []

  - id: query_command
    selector:
      kind: any
      items:
        - kind: has_flag
          flag: "-v"
        - kind: has_flag
          flag: "-V"
    parameters:
      - name: command_names
        semantic:
          kind: plain_value
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque

modifiers:
  - id: default_path
    matcher:
      kind: any_flag
      flags:
        - "-p"

  - id: query_path
    matcher:
      kind: any_flag
      flags:
        - "-v"

  - id: query_description
    matcher:
      kind: any_flag
      flags:
        - "-V"

subcommands: null
extensions: {}
