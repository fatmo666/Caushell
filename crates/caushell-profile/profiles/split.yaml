dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: split
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: split_with_prefix
    selector:
      kind: has_positional_at
      index: 1
    parameters:
      - name: input_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals_before_last
        cardinality: optional_many
        value_constraints:
          - kind: exclude_literal
            value: "-"
      - name: output_prefix
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: last_positional
        cardinality: required_one
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_paths
      - kind: write_path
        target:
          kind: slot
          name: output_prefix

  - id: split_default_prefix
    selector:
      kind: not
      item:
        kind: has_positional_at
        index: 1
    parameters:
      - name: input_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: next_positional
        cardinality: optional_one
        value_constraints:
          - kind: exclude_literal
            value: "-"
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_path
      - kind: write_path
        target:
          kind: tool_convention_path
          path: x*
          convention: split.default_prefix
          purpose: generic_operand

modifiers:
  - id: chunk_size
    matcher:
      kind: any_flag
      flags:
        - "-b"
        - "--bytes"
        - "-C"
        - "--line-bytes"
        - "-l"
        - "--lines"
        - "-n"
        - "--number"
    parameters:
      - name: chunk_spec
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

  - id: suffix
    matcher:
      kind: any_flag
      flags:
        - "-a"
        - "--suffix-length"
        - "--additional-suffix"
    parameters:
      - name: suffix_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

  - id: filter_command
    matcher:
      kind: any_flag
      flags:
        - "--filter"
    parameters:
      - name: filter_command
        semantic:
          kind: command_ref
          dispatch: shell_payload
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: filter_command

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
    - command-frequency/D4-security-bash/weaponizable_overlap.csv
