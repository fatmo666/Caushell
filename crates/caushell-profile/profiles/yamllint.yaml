dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: yamllint
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: lint_yaml
    selector:
      kind: all
      items: []
    parameters:
      - name: input_targets
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_targets
      - kind: load_config
        target:
          kind: tool_convention_path
          path: .yamllint
          convention: yamllint.project_config
          purpose: tool_config
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: config_file
    matcher:
      kind: any_flag
      flags:
        - "-c"
        - "--config-file"
    parameters:
      - name: config_path
        semantic:
          kind: path
          role: config
          purpose: tool_config
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: load_config
        target:
          kind: slot
          name: config_path

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
