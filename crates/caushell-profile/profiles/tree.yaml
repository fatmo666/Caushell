dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: tree
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: tree_to_stdout
    selector:
      kind: not
      item:
        kind: has_modifier
        modifier: output_path
    parameters:
      - name: path_targets
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: path_list
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: path_targets

  - id: tree_to_file
    selector:
      kind: has_modifier
      modifier: output_path
    parameters:
      - name: path_targets
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: opaque
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: path_targets

modifiers:
  - id: output_path
    matcher:
      kind: any_flag
      flags:
        - "-o"
    parameters:
      - name: output_path
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: write_path
        target:
          kind: slot
          name: output_path

  - id: display_mode
    matcher:
      kind: any_flag
      flags:
        - "-a"
        - "-d"
        - "-f"
        - "-h"
        - "-i"
        - "-p"
        - "-s"
        - "-u"
        - "-g"
        - "-D"
        - "-L"
    parameters:
      - name: display_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
