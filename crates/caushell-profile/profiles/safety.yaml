dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: safety
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: scan_dependencies
    selector:
      kind: all
      items: []
    parameters:
      - name: arguments
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    stream_contract:
      stdin_mode: data_optional
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: tool_convention_path
          path: requirements.txt
          convention: python.requirements
          purpose: generic_operand
      - kind: network_endpoint
        target:
          kind: none
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: requirement_file
    matcher:
      kind: any_flag
      flags:
        - "-r"
        - "--file"
    parameters:
      - name: requirement_file
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many
    effects:
      - kind: read_path
        target:
          kind: slot
          name: requirement_file

  - id: output_file
    matcher:
      kind: any_flag
      flags:
        - "--save-json"
    parameters:
      - name: output_path
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: write_path
        target:
          kind: slot
          name: output_path

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
  caushell.profile/known_limitations:
    - Vulnerability database access is represented as a network endpoint without parsing Safety's service URL or credentials.
