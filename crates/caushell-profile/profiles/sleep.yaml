dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: sleep
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: delay
    selector:
      kind: all
      items: []
    parameters:
      - name: durations
        semantic:
          kind: structured_value
          context: numeric_quantity
        binding:
          kind: remaining_args
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: opaque
      stderr_mode: opaque

modifiers: []
subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
