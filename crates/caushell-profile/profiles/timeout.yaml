dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: timeout
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: wrapped_command
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 1
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "--version"
    remaining_selector:
      kind: no_positional_args
    parameters:
      - name: duration
        semantic:
          kind: plain_value
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment: []

modifiers:
  - id: foreground
    matcher:
      kind: any_flag
      flags:
        - "--foreground"

  - id: preserve_status
    matcher:
      kind: any_flag
      flags:
        - "--preserve-status"

  - id: verbose
    matcher:
      kind: any_flag
      flags:
        - "-v"
        - "--verbose"

  - id: signal
    matcher:
      kind: any_flag
      flags:
        - "-s"
        - "--signal"
    parameters:
      - name: signal_name
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: kill_after
    matcher:
      kind: any_flag
      flags:
        - "-k"
        - "--kill-after"
    parameters:
      - name: kill_after_duration
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: help
    matcher:
      kind: any_flag
      flags:
        - "--help"

  - id: version
    matcher:
      kind: any_flag
      flags:
        - "--version"

subcommands: null
extensions: {}
