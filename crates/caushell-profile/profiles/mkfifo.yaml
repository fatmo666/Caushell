dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: mkfifo
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: create_fifo
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: output_paths
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: required_many
    effects:
      - kind: write_path
        target:
          kind: slot
          name: output_paths

modifiers:
  - id: mode
    matcher:
      kind: any_flag
      flags:
        - "-m"
        - "--mode"
    parameters:
      - name: mode
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
