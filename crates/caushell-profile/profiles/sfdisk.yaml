dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: sfdisk
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - linux
  shell_families: []
  requires_features: []

forms:
  - id: show_help
    selector:
      kind: any
      items:
        - kind: has_flag
          flag: "-h"
        - kind: has_flag
          flag: "--help"

  - id: show_version
    selector:
      kind: all
      items:
        - kind: any
          items:
            - kind: has_flag
              flag: "-v"
            - kind: has_flag
              flag: "--version"
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"

  - id: list_partition_tables
    selector:
      kind: all
      items:
        - kind: any
          items:
            - kind: has_flag
              flag: "-d"
            - kind: has_flag
              flag: "--dump"
            - kind: has_flag
              flag: "-J"
            - kind: has_flag
              flag: "--json"
            - kind: has_flag
              flag: "-g"
            - kind: has_flag
              flag: "--show-geometry"
            - kind: has_flag
              flag: "-G"
            - kind: has_flag
              flag: "--show-pt-geometry"
            - kind: has_flag
              flag: "-l"
            - kind: has_flag
              flag: "--list"
            - kind: has_flag
              flag: "-F"
            - kind: has_flag
              flag: "--list-free"
            - kind: has_flag
              flag: "-s"
            - kind: has_flag
              flag: "--show-size"
            - kind: has_flag
              flag: "-V"
            - kind: has_flag
              flag: "--verify"
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "-v"
              - kind: has_flag
                flag: "--version"
    parameters:
      - name: device_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    effects:
      - kind: read_path
        target:
          kind: slot
          name: device_paths

  - id: list_partition_types
    selector:
      kind: any
      items:
        - kind: has_flag
          flag: "-T"
        - kind: has_flag
          flag: "--list-types"

  - id: delete_partitions
