dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: exec
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families:
    - bourne
    - bash
    - sh
    - dash
  requires_features: []

forms:
  - id: wrapped_command
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment: []

modifiers:
  - id: clear_environment
    matcher:
      kind: any_flag
      flags:
        - "-c"

  - id: login_shell
    matcher:
      kind: any_flag
      flags:
        - "-l"

  - id: argv0
    matcher:
      kind: any_flag
      flags:
        - "-a"
    parameters:
      - name: argv0
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

subcommands: null
extensions: {}
