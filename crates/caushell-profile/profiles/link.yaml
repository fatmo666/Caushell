dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: link
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: create_hard_link
    selector:
      kind: has_positional_at
      index: 1
    parameters:
      - name: source_path
        semantic:
          kind: path
          role: target
          purpose: generic_operand
        binding:
          kind: next_positional
        cardinality: required_one
      - name: link_path
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: next_positional
        cardinality: required_one
    effects:
      - kind: target_path
        target:
          kind: slot
          name: source_path
      - kind: write_path
        target:
          kind: slot
          name: link_path

modifiers: []
subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
