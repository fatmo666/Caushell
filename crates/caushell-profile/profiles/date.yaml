dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: date
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: print_or_parse_date
    selector:
      kind: all
      items: []
    parameters:
      - name: format_or_dates
        semantic:
          kind: structured_value
          context: date_expression
        binding:
          kind: remaining_args
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: date_file
    matcher:
      kind: any_flag
      flags:
        - "-f"
        - "--file"
    parameters:
      - name: input_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_path

  - id: date_string
    matcher:
      kind: any_flag
      flags:
        - "-d"
        - "--date"
    parameters:
      - name: date_expression
        semantic:
          kind: structured_value
          context: date_expression
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
    - command-frequency/D4-security-bash/weaponizable_overlap.csv
