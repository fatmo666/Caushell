dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: touch
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: create_or_update_paths
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: path_targets
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: required_many
    effects:
      - kind: write_path
        target:
          kind: slot
          name: path_targets

modifiers:
  - id: reference_file
    matcher:
      kind: any_flag
      flags:
        - "-r"
        - "--reference"
    parameters:
      - name: reference_file
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: read_path
        target:
          kind: slot
          name: reference_file

  - id: timestamp
    matcher:
      kind: any_flag
      flags:
        - "-d"
        - "--date"
        - "-t"
    parameters:
      - name: timestamp
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

  - id: update_mode
    matcher:
      kind: any_flag
      flags:
        - "-a"
        - "-m"
        - "-c"
        - "--no-create"
subcommands: null
extensions: {}
