dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: bg
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families:
    - bourne
    - bash
    - sh
    - dash
  requires_features: []

forms:
  - id: resume_job
    selector:
      kind: has_positional_at
      index: 0
    remaining_selector:
      kind: no_positional_args
    parameters:
      - name: target
        semantic:
          kind: process_target
          target_kind: job_spec
          broad_match: false
        binding:
          kind: next_positional
        cardinality: required_one
    effects:
      - kind: control_process
        target:
          kind: slot
          name: target

modifiers: []
subcommands: null
extensions: {}
