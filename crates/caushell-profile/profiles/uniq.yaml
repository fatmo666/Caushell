dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: uniq
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: unique_to_file
    selector:
      kind: has_positional_at
      index: 1
    parameters:
      - name: input_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals_before_last
        cardinality: optional_many
        value_constraints:
          - kind: exclude_literal
            value: "-"
      - name: output_path
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: last_positional
        cardinality: required_one
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_paths
      - kind: write_path
        target:
          kind: slot
          name: output_path
      - kind: transform_data
        target:
          kind: none

  - id: unique_to_stdout
    selector:
      kind: not
      item:
        kind: has_positional_at
        index: 1
    parameters:
      - name: input_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: next_positional
        cardinality: optional_one
        value_constraints:
          - kind: exclude_literal
            value: "-"
    stream_contract:
      stdin_mode: data_optional
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_path
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: mode
    matcher:
      kind: any_flag
      flags:
        - "-c"
        - "--count"
        - "-d"
        - "--repeated"
        - "-u"
        - "--unique"
        - "-i"
        - "--ignore-case"
        - "-z"
        - "--zero-terminated"

  - id: skip
    matcher:
      kind: any_flag
      flags:
        - "-f"
        - "--skip-fields"
        - "-s"
        - "--skip-chars"
        - "-w"
        - "--check-chars"
    parameters:
      - name: skip_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
    - command-frequency/D4-security-bash/weaponizable_overlap.csv
