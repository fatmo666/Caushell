dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: fakeroot
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
  shell_families: []
  requires_features: []

forms:
  - id: wrapped_command
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "-v"
              - kind: has_flag
                flag: "--version"
    parameters:
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment: []

modifiers:
  - id: library
    matcher:
      kind: any_flag
      flags:
        - "-l"
        - "--lib"
    parameters:
      - name: library_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: faked_binary
    matcher:
      kind: any_flag
      flags:
        - "-f"
        - "--faked"
    parameters:
      - name: faked_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: load_state
    matcher:
      kind: any_flag
      flags:
        - "-i"
        - "--load"
    parameters:
      - name: state_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: save_state
    matcher:
      kind: any_flag
      flags:
        - "-s"
        - "--save-file"
    parameters:
      - name: state_path
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: fd_base
    matcher:
      kind: any_flag
      flags:
        - "-b"
        - "--fd-base"
    parameters:
      - name: fd_base
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: unknown_is_real
    matcher:
      kind: any_flag
      flags:
        - "-u"
        - "--unknown-is-real"

  - id: help
    matcher:
      kind: any_flag
      flags:
        - "-h"
        - "--help"

  - id: version
    matcher:
      kind: any_flag
      flags:
        - "-v"
        - "--version"

subcommands: null
extensions: {}
