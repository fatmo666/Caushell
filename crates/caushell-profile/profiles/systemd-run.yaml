dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: systemd-run
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - linux
  shell_families: []
  requires_features: []

forms:
  - id: wrapped_command
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "--version"
    parameters:
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment: []

modifiers:
  - id: mode
    matcher:
      kind: any_flag
      flags:
        - "--scope"
        - "--user"
        - "--system"
        - "--wait"
        - "--pty"
        - "--pipe"
        - "--collect"
        - "--remain-after-exit"
        - "--send-sighup"
        - "--quiet"
        - "--no-block"
        - "--no-ask-password"
        - "--same-dir"

  - id: unit
    matcher:
      kind: any_flag
      flags:
        - "--unit"
        - "--description"
        - "--slice"
        - "--service-type"
        - "--uid"
        - "--gid"
        - "--nice"
        - "--working-directory"
    parameters:
      - name: option_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: property
    matcher:
      kind: any_flag
      flags:
        - "-p"
        - "--property"
        - "--timer-property"
        - "-E"
        - "--setenv"
    parameters:
      - name: option_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: timer
    matcher:
      kind: any_flag
      flags:
        - "--on-active"
        - "--on-boot"
        - "--on-startup"
        - "--on-unit-active"
        - "--on-unit-inactive"
        - "--on-calendar"
    parameters:
      - name: timer_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: help
    matcher:
      kind: any_flag
      flags:
        - "-h"
        - "--help"

  - id: version
    matcher:
      kind: any_flag
      flags:
        - "--version"

subcommands: null
extensions:
  caushell.profile/known_limitations:
    - This profile models transient-unit command launch and common options that shift the command position; unit file side effects are not expanded beyond child command dispatch.
