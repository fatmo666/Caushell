dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: kill
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families:
    - bourne
    - bash
    - sh
    - dash
  requires_features: []

forms:
  - id: signal_targets
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: targets
        semantic:
          kind: process_target
          target_kind: unknown
          broad_match: false
        binding:
          kind: remaining_positionals
        cardinality: required_many
    effects:
      - kind: control_process
        target:
          kind: slot
          name: targets

modifiers:
  - id: signal
    matcher:
      kind: any_flag
      flags:
        - "-s"
        - "--signal"
    parameters:
      - name: signal_spec
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

subcommands: null
extensions: {}
