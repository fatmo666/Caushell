dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: pkg-config
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: query_packages
    selector:
      kind: all
      items: []
    parameters:
      - name: package_names
        semantic:
          kind: plain_value
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: tool_convention_path
          path: pkgconfig
          convention: pkg_config.search_path
          purpose: generic_operand
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: define_variable
    matcher:
      kind: any_flag
      flags:
        - "--define-variable"
    parameters:
      - name: variable_assignment
        semantic:
          kind: structured_value
          context: env_assignment
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

  - id: path_variables
    matcher:
      kind: any_flag
      flags:
        - "--with-path"
        - "--env-only"

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
