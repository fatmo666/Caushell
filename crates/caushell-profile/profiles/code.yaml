dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: code
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: open_workspace
    selector:
      kind: all
      items: []
    parameters:
      - name: path_targets
        semantic:
          kind: path
          role: target
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    effects:
      - kind: target_path
        target:
          kind: slot
          name: path_targets
      - kind: open_interactive_escape_surface
        target:
          kind: none
        surface:
          kind: editor
          requires_tty: false
          capabilities:
            - run_command
            - launch_external_editor
            - write_buffer_to_path

modifiers:
  - id: wait
    matcher:
      kind: any_flag
      flags:
        - "-w"
        - "--wait"

  - id: reuse_window
    matcher:
      kind: any_flag
      flags:
        - "-r"
        - "--reuse-window"
        - "-n"
        - "--new-window"

  - id: goto
    matcher:
      kind: any_flag
      flags:
        - "-g"
        - "--goto"

  - id: extension_install
    matcher:
      kind: any_flag
      flags:
        - "--install-extension"
    parameters:
      - name: extension_id
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many
    effects:
      - kind: execute_imported_package_logic
        target:
          kind: slot
          name: extension_id

  - id: extension_uninstall
    matcher:
      kind: any_flag
      flags:
        - "--uninstall-extension"
    parameters:
      - name: extension_id
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many
    effects:
      - kind: metadata_mutation
        target:
          kind: none

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
    - command-frequency/D4-security-bash/weaponizable_overlap.csv
  caushell.profile/known_limitations:
    - VS Code remote tunnel and URI forms are modeled as an interactive editor/control surface, not as fully parsed transport endpoints yet.
