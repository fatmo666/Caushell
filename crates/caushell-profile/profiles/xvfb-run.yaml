dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: xvfb-run
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - linux
  shell_families: []
  requires_features: []

forms:
  - id: wrapped_command
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"
    parameters:
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment: []

modifiers:
  - id: auto_servernum
    matcher:
      kind: any_flag
      flags:
        - "-a"
        - "--auto-servernum"

  - id: output_error_file
    matcher:
      kind: any_flag
      flags:
        - "-e"
        - "--error-file"
    parameters:
      - name: error_path
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: auth_file
    matcher:
      kind: any_flag
      flags:
        - "-f"
        - "--auth-file"
    parameters:
      - name: auth_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: server_number
    matcher:
      kind: any_flag
      flags:
        - "-n"
        - "--server-num"
    parameters:
      - name: server_number
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: listen_tcp
    matcher:
      kind: any_flag
      flags:
        - "-l"
        - "--listen-tcp"

  - id: server_args
    matcher:
      kind: any_flag
      flags:
        - "-s"
        - "--server-args"
    parameters:
      - name: server_args
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: xauth_protocol
    matcher:
      kind: any_flag
      flags:
        - "-p"
        - "--xauth-protocol"
    parameters:
      - name: protocol
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: server_wait
    matcher:
      kind: any_flag
      flags:
        - "-w"
        - "--server-wait"
    parameters:
      - name: delay
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: help
    matcher:
      kind: any_flag
      flags:
        - "-h"
        - "--help"

subcommands: null
extensions: {}
