dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: git
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms: []

modifiers:
  - id: work_tree
    matcher:
      kind: any_flag
      flags:
        - "-C"
    parameters:
      - name: working_directory
        semantic:
          kind: path
          role: cwd_anchor
          purpose: working_directory
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one
    effects:
      - kind: target_path
        target:
          kind: slot
          name: working_directory

  - id: no_verify
    matcher:
      kind: any_flag
      flags:
        - "-n"
        - "--no-verify"

subcommands:
  roots:
    - name: clone
      aliases: []
      forms:
        - id: clone_repository_with_recursive_submodules
          selector:
            kind: all
            items:
              - kind: has_positional_at
                index: 1
              - kind: has_flag
                flag: "--recurse-submodules"
          parameters:
            - name: repository
              semantic:
                kind: endpoint
                endpoint_kind: url
                usage: fetch_source
              binding:
                kind: next_positional
              cardinality: required_one
            - name: destination
              semantic:
                kind: path
                role: write
                purpose: generic_operand
              binding:
                kind: next_positional
              cardinality: required_one
          effects:
            - kind: network_endpoint
              target:
                kind: slot
                name: repository
            - kind: write_path
              target:
                kind: slot
                name: destination
            - kind: load_config
              target:
                kind: derived_path
                source:
                  kind: slot
                  name: destination
                rule:
                  kind: child_under
                  relative_path: .gitmodules
                purpose: tool_config
            - kind: write_path
              target:
                kind: mutation_scope
                scope_kind: repository_worktree
                root: destination
                path_set: registered_submodule_worktrees
        - id: clone_repository
          selector:
            kind: all
            items:
              - kind: has_positional_at
                index: 0
              - kind: not
                item:
                  kind: all
                  items:
                    - kind: has_positional_at
                      index: 1
                    - kind: has_flag
                      flag: "--recurse-submodules"
          parameters:
            - name: repository
              semantic:
                kind: endpoint
                endpoint_kind: url
                usage: fetch_source
              binding:
                kind: next_positional
              cardinality: required_one
            - name: destination
              semantic:
                kind: path
                role: write
                purpose: generic_operand
              binding:
                kind: next_positional
              cardinality: optional_one
          effects:
            - kind: network_endpoint
              target:
                kind: slot
                name: repository
            - kind: write_path
              target:
                kind: slot
                name: destination
      modifiers: []
      children: []
      default_behavior: reject_unknown
      extensions: {}

    - name: remote
      aliases: []
      forms:
        - id: list_remotes
          selector:
            kind: all
            items: []
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: load_config
              target:
                kind: tool_convention_path
                path: .git/config
                convention: git.local_config
                purpose: tool_config
            - kind: transform_data
              target:
                kind: none
      modifiers: []
      children:
        - name: add
          aliases: []
          forms:
            - id: add_remote
              selector:
                kind: has_positional_at
                index: 0
              parameters:
                - name: remote_name
                  semantic:
                    kind: plain_value
                  binding:
                    kind: next_positional
                  cardinality: required_one
                - name: endpoint
                  semantic:
                    kind: endpoint
                    endpoint_kind: url
                    usage: control_plane
                  binding:
                    kind: next_positional
                  cardinality: required_one
              effects:
                - kind: network_endpoint
                  target:
                    kind: slot
                    name: endpoint
                - kind: write_path
                  target:
                    kind: tool_convention_path
                    path: .git/config
                    convention: git.local_config
                    purpose: tool_config
          modifiers: []
          children: []
          default_behavior: reject_unknown
          extensions: {}
        - name: remove
          aliases:
            - rm
          forms:
            - id: remove_remote
              selector:
                kind: has_positional_at
                index: 0
              parameters:
                - name: remote_name
                  semantic:
                    kind: plain_value
                  binding:
                    kind: next_positional
                  cardinality: required_one
              effects:
                - kind: write_path
                  target:
                    kind: tool_convention_path
                    path: .git/config
                    convention: git.local_config
                    purpose: tool_config
          modifiers: []
          children: []
          default_behavior: reject_unknown
          extensions: {}
        - name: rename
          aliases: []
          forms:
            - id: rename_remote
              selector:
                kind: has_positional_at
                index: 1
              parameters:
                - name: remote_names
                  semantic:
                    kind: plain_value
                  binding:
                    kind: remaining_args
                  cardinality: required_many
              effects:
                - kind: write_path
                  target:
                    kind: tool_convention_path
                    path: .git/config
                    convention: git.local_config
                    purpose: tool_config
          modifiers: []
          children: []
          default_behavior: reject_unknown
          extensions: {}
        - name: get-url
          aliases: []
          forms:
            - id: get_remote_url
              selector:
                kind: all
                items: []
              parameters:
                - name: remote_name
                  semantic:
                    kind: plain_value
                  binding:
                    kind: remaining_args
                  cardinality: optional_many
              stream_contract:
                stdin_mode: ignored
                stdout_mode: data
                stderr_mode: opaque
              effects:
                - kind: load_config
                  target:
                    kind: tool_convention_path
                    path: .git/config
                    convention: git.local_config
                    purpose: tool_config
                - kind: transform_data
                  target:
                    kind: none
          modifiers: []
          children: []
          default_behavior: reject_unknown
          extensions: {}
        - name: set-url
          aliases: []
          forms:
            - id: set_remote_url
              selector:
                kind: has_positional_at
                index: 1
              parameters:
                - name: remote_name
                  semantic:
                    kind: plain_value
                  binding:
                    kind: next_positional
                  cardinality: required_one
                - name: endpoint
                  semantic:
                    kind: endpoint
                    endpoint_kind: url
                    usage: control_plane
                  binding:
                    kind: next_positional
                  cardinality: required_one
              effects:
                - kind: network_endpoint
                  target:
                    kind: slot
                    name: endpoint
                - kind: write_path
                  target:
                    kind: tool_convention_path
                    path: .git/config
                    convention: git.local_config
                    purpose: tool_config
          modifiers: []
          children: []
          default_behavior: reject_unknown
          extensions: {}
        - name: show
          aliases: []
          forms:
            - id: show_remote
              selector:
                kind: all
                items: []
              parameters:
                - name: remote_names
                  semantic:
                    kind: plain_value
                  binding:
                    kind: remaining_args
                  cardinality: optional_many
              stream_contract:
                stdin_mode: ignored
                stdout_mode: data
                stderr_mode: opaque
              effects:
                - kind: load_config
                  target:
                    kind: tool_convention_path
                    path: .git/config
                    convention: git.local_config
                    purpose: tool_config
                - kind: network_endpoint
                  target:
                    kind: none
                - kind: transform_data
                  target:
                    kind: none
          modifiers: []
          children: []
          default_behavior: reject_unknown
          extensions:
            caushell.profile/known_limitations:
              - git remote show can be local-only with -n, but this profile currently records the default network inspection surface for the subcommand.
        - name: prune
          aliases: []
          forms:
            - id: prune_remote_dry_run
              selector:
                kind: has_modifier
                modifier: dry_run
              parameters:
                - name: remote_names
                  semantic:
                    kind: plain_value
                  binding:
                    kind: remaining_args
                  cardinality: optional_many
              stream_contract:
                stdin_mode: ignored
                stdout_mode: data
                stderr_mode: opaque
              effects:
                - kind: load_config
                  target:
                    kind: tool_convention_path
                    path: .git/config
                    convention: git.local_config
                    purpose: tool_config
                - kind: network_endpoint
                  target:
                    kind: none
                - kind: transform_data
                  target:
                    kind: none
            - id: prune_remote_tracking_refs
              selector:
                kind: not
                item:
                  kind: has_modifier
                  modifier: dry_run
              parameters:
                - name: remote_names
                  semantic:
                    kind: plain_value
                  binding:
                    kind: remaining_args
                  cardinality: optional_many
              effects:
                - kind: load_config
                  target:
                    kind: tool_convention_path
                    path: .git/config
                    convention: git.local_config
                    purpose: tool_config
                - kind: network_endpoint
                  target:
                    kind: none
                - kind: write_path
                  target:
                    kind: tool_convention_path
                    path: .git
                    convention: git.repository_metadata
                    purpose: generic_operand
          modifiers:
            - id: dry_run
              matcher:
                kind: any_flag
                flags:
                  - "-n"
                  - "--dry-run"
          children: []
          default_behavior: reject_unknown
          extensions: {}
        - name: update
          aliases: []
          forms:
            - id: update_remotes
              selector:
                kind: all
                items: []
              parameters:
                - name: remote_names
                  semantic:
                    kind: plain_value
                  binding:
                    kind: remaining_args
                  cardinality: optional_many
              effects:
                - kind: load_config
                  target:
                    kind: tool_convention_path
                    path: .git/config
                    convention: git.local_config
                    purpose: tool_config
                - kind: network_endpoint
                  target:
                    kind: none
                - kind: write_path
                  target:
                    kind: tool_convention_path
                    path: .git
                    convention: git.repository_metadata
                    purpose: generic_operand
          modifiers: []
          children: []
          default_behavior: reject_unknown
          extensions: {}
        - name: set-head
          aliases: []
          forms:
            - id: set_remote_head
              selector:
                kind: has_positional_at
                index: 0
              parameters:
                - name: remote_args
                  semantic:
                    kind: plain_value
                  binding:
                    kind: remaining_args
                  cardinality: required_many
              effects:
                - kind: write_path
                  target:
                    kind: tool_convention_path
                    path: .git
                    convention: git.repository_metadata
                    purpose: generic_operand
          modifiers: []
          children: []
          default_behavior: reject_unknown
          extensions: {}
        - name: set-branches
          aliases: []
          forms:
            - id: set_remote_branches
              selector:
                kind: has_positional_at
                index: 1
              parameters:
                - name: remote_args
                  semantic:
                    kind: plain_value
                  binding:
                    kind: remaining_args
                  cardinality: required_many
              effects:
                - kind: write_path
                  target:
                    kind: tool_convention_path
                    path: .git/config
                    convention: git.local_config
                    purpose: tool_config
          modifiers: []
          children: []
          default_behavior: reject_unknown
          extensions: {}
      default_behavior: reject_unknown
      extensions: {}

    - name: status
      aliases: []
      forms:
        - id: inspect_worktree_status
          selector:
            kind: all
            items: []
          parameters:
            - name: pathspecs
              semantic:
                kind: path
                role: read
                purpose: generic_operand
              binding:
                kind: remaining_positionals
              cardinality: optional_many
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: read_path
              target:
                kind: slot
                name: pathspecs
            - kind: transform_data
              target:
                kind: none
      modifiers: []
      children: []
      default_behavior: reject_unknown
      extensions: {}

    - name: diff
      aliases: []
      forms:
        - id: inspect_diff_pathspecs
          selector:
            kind: has_dash_dash
          parameters:
            - name: pathspecs
              semantic:
                kind: path
                role: read
                purpose: generic_operand
              binding:
                kind: remaining_positionals_after_dash_dash
              cardinality: optional_many
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: read_path
              target:
                kind: slot
                name: pathspecs
            - kind: transform_data
              target:
                kind: none

        - id: inspect_diff
          selector:
            kind: no_dash_dash
          parameters:
            - name: revision_args
              semantic:
                kind: plain_value
              binding:
                kind: remaining_args
              cardinality: optional_many
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: transform_data
              target:
                kind: none
      modifiers:
        - id: order_file
          matcher:
            kind: any_flag
            flags:
              - "-O"
          parameters:
            - name: order_file
              semantic:
                kind: path
                role: read
                purpose: generic_operand
              binding:
                kind: following_matched_flag
                operand_mode: inline_or_short_attached
              cardinality: optional_one
          effects:
            - kind: read_path
              target:
                kind: slot
                name: order_file

        - id: output_file
          matcher:
            kind: any_flag
            flags:
              - "--output"
          parameters:
            - name: output_path
              semantic:
                kind: path
                role: write
                purpose: generic_operand
              binding:
                kind: following_matched_flag
                operand_mode: next_arg
              cardinality: required_one
          effects:
            - kind: write_path
              target:
                kind: slot
                name: output_path
      children: []
      default_behavior: reject_unknown
      extensions:
        caushell.profile/known_limitations:
          - Without an explicit -- separator, git diff positionals are left as plain revision args to avoid misclassifying commit names or blobs as filesystem paths.

    - name: log
      aliases: []
      forms:
        - id: inspect_history_pathspecs
          selector:
            kind: has_dash_dash
          parameters:
            - name: pathspecs
              semantic:
                kind: path
                role: read
                purpose: generic_operand
              binding:
                kind: remaining_positionals_after_dash_dash
              cardinality: optional_many
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: read_path
              target:
                kind: slot
                name: pathspecs
            - kind: transform_data
              target:
                kind: none

        - id: inspect_history
          selector:
            kind: no_dash_dash
          parameters:
            - name: revision_args
              semantic:
                kind: plain_value
              binding:
                kind: remaining_args
              cardinality: optional_many
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: transform_data
              target:
                kind: none
      modifiers: []
      children: []
      default_behavior: reject_unknown
      extensions: {}

    - name: show
      aliases: []
      forms:
        - id: inspect_object_or_history
          selector:
            kind: all
            items: []
          parameters:
            - name: object_args
              semantic:
                kind: plain_value
              binding:
                kind: remaining_args
              cardinality: optional_many
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: transform_data
              target:
                kind: none
      modifiers: []
      children: []
      default_behavior: reject_unknown
      extensions: {}

    - name: rev-parse
      aliases: []
      forms:
        - id: parse_revisions
          selector:
            kind: all
            items: []
          parameters:
            - name: revision_args
              semantic:
                kind: plain_value
              binding:
                kind: remaining_args
              cardinality: optional_many
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: transform_data
              target:
                kind: none
      modifiers: []
      children: []
      default_behavior: reject_unknown
      extensions: {}

    - name: ls-files
      aliases: []
      forms:
        - id: list_index_paths
          selector:
            kind: all
            items: []
          parameters:
            - name: pathspecs
              semantic:
                kind: path
                role: read
                purpose: generic_operand
              binding:
                kind: remaining_positionals
              cardinality: optional_many
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: read_path
              target:
                kind: slot
                name: pathspecs
            - kind: transform_data
              target:
                kind: none
      modifiers: []
      children: []
      default_behavior: reject_unknown
      extensions: {}

    - name: add
      aliases: []
      forms:
        - id: inspect_index_update
          selector:
            kind: has_modifier
            modifier: dry_run
          parameters:
            - name: pathspecs
              semantic:
                kind: path
                role: read
                purpose: generic_operand
              binding:
                kind: remaining_positionals
              cardinality: optional_many
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: read_path
              target:
                kind: slot
                name: pathspecs
            - kind: transform_data
              target:
                kind: none

        - id: interactive_index_update
          selector:
            kind: any
            items:
              - kind: has_modifier
                modifier: interactive
              - kind: has_modifier
                modifier: patch
              - kind: has_modifier
                modifier: edit
          parameters:
            - name: pathspecs
              semantic:
                kind: path
                role: read
                purpose: generic_operand
              binding:
                kind: remaining_positionals
              cardinality: optional_many
          stream_contract:
            stdin_mode: data_optional
            stdout_mode: opaque
            stderr_mode: opaque
          effects:
            - kind: read_path
              target:
                kind: slot
                name: pathspecs
            - kind: write_path
              target:
                kind: tool_convention_path
                path: .git/index
                convention: git.index
                purpose: generic_operand
            - kind: open_interactive_escape_surface
              target:
                kind: none
              surface:
                kind: terminal_ui
                requires_tty: true
                capabilities:
                  - run_command

        - id: update_index
          selector:
            kind: all
            items:
              - kind: not
                item:
                  kind: any
                  items:
                    - kind: has_modifier
                      modifier: dry_run
                    - kind: has_modifier
                      modifier: interactive
                    - kind: has_modifier
                      modifier: patch
                    - kind: has_modifier
                      modifier: edit
          parameters:
            - name: pathspecs
              semantic:
                kind: path
                role: read
                purpose: generic_operand
              binding:
                kind: remaining_positionals
              cardinality: optional_many
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: read_path
              target:
                kind: slot
                name: pathspecs
            - kind: write_path
              target:
                kind: tool_convention_path
                path: .git/index
                convention: git.index
                purpose: generic_operand
      modifiers:
        - id: dry_run
          matcher:
            kind: any_flag
            flags:
              - "-n"
              - "--dry-run"

        - id: interactive
          matcher:
            kind: any_flag
            flags:
              - "-i"
              - "--interactive"

        - id: patch
          matcher:
            kind: any_flag
            flags:
              - "-p"
              - "--patch"

        - id: edit
          matcher:
            kind: any_flag
            flags:
              - "-e"
              - "--edit"

        - id: pathspec_from_file
          matcher:
            kind: any_flag
            flags:
              - "--pathspec-from-file"
          parameters:
            - name: pathspec_file
              semantic:
                kind: path
                role: read
                purpose: generic_operand
              binding:
                kind: following_matched_flag
                operand_mode: next_arg
              cardinality: required_one
          effects:
            - kind: read_path
              target:
                kind: slot
                name: pathspec_file

        - id: pathspec_file_nul
          matcher:
            kind: any_flag
            flags:
              - "--pathspec-file-nul"

        - id: mode
          matcher:
            kind: any_flag
            flags:
              - "-A"
              - "--all"
              - "-u"
              - "--update"
              - "--refresh"
              - "--renormalize"
              - "-N"
              - "--intent-to-add"
              - "-f"
              - "--force"
              - "--ignore-removal"
              - "--ignore-errors"
              - "--ignore-missing"
              - "--sparse"
      children: []
      default_behavior: reject_unknown
      extensions:
        caushell.profile/known_limitations:
          - git add mutates the repository index. The current effect model records that as a .git/index write rather than a first-class index mutation scope.

    - name: push
      aliases: []
      forms:
        - id: upload_refs
          selector:
            kind: all
            items: []
          parameters:
            - name: push_args
              semantic:
                kind: plain_value
              binding:
                kind: remaining_args
              cardinality: optional_many
          stream_contract:
            stdin_mode: ignored
            stdout_mode: data
            stderr_mode: opaque
          effects:
            - kind: load_config
              target:
                kind: tool_convention_path
                path: .git/config
                convention: git.local_config
                purpose: tool_config
            - kind: network_endpoint
              target:
                kind: none
      modifiers:
        - id: repository
          matcher:
            kind: any_flag
            flags:
              - "--repo"
          parameters:
            - name: repository
              semantic:
                kind: endpoint
                endpoint_kind: remote_spec
                usage: upload_target
              binding:
                kind: following_matched_flag
                operand_mode: next_arg
              cardinality: optional_one
          effects:
            - kind: network_endpoint
              target:
                kind: slot
                name: repository

        - id: push_option
          matcher:
            kind: any_flag
            flags:
              - "-o"
              - "--push-option"
          parameters:
            - name: push_option
              semantic:
                kind: plain_value
              binding:
                kind: following_matched_flag
                operand_mode: next_arg
              cardinality: optional_many

        - id: receive_pack
          matcher:
            kind: any_flag
            flags:
              - "--receive-pack"
              - "--exec"
          parameters:
            - name: receive_pack
              semantic:
                kind: plain_value
              binding:
                kind: following_matched_flag
                operand_mode: next_arg
              cardinality: optional_one

        - id: mode
          matcher:
            kind: any_flag
            flags:
              - "-v"
              - "--verbose"
              - "-q"
              - "--quiet"
              - "--all"
              - "--branches"
              - "--mirror"
              - "-d"
              - "--delete"
              - "--tags"
              - "-n"
              - "--dry-run"
              - "--porcelain"
              - "-f"
              - "--force"
              - "--force-with-lease"
              - "--force-if-includes"
              - "-u"
              - "--set-upstream"
              - "--progress"
              - "--prune"
              - "--no-verify"
              - "--verify"
              - "--follow-tags"
              - "--signed"
              - "--atomic"
              - "-4"
              - "--ipv4"
              - "-6"
              - "--ipv6"
      children: []
      default_behavior: reject_unknown
      extensions:
        caushell.profile/known_limitations:
          - Remote names such as origin are modeled as command arguments; resolving them to concrete URLs requires reading git config outside this command profile.

    - name: fetch
      aliases: []
      forms:
        - id: fetch_refs_dry_run
          selector:
            kind: has_modifier
            modifier: dry_run
          parameters:
            - name: fetch_args
              semantic:
                kind: plain_value
              binding:
                kind: remaining_args
              cardinality: optional_many
          stream_contract:
            stdin_mode: data_optional
            stdout_mode: data
