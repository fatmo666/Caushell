            flags:
              - "-n"
              - "--dry-run"

        - id: force
          matcher:
            kind: any_flag
            flags:
              - "-f"
              - "--force"

        - id: interactive
          matcher:
            kind: any_flag
            flags:
              - "-i"
              - "--interactive"

        - id: dirs
          matcher:
            kind: any_flag
            flags:
              - "-d"

        - id: include_ignored
          matcher:
            kind: any_flag
            flags:
              - "-x"

        - id: include_ignored_only
          matcher:
            kind: any_flag
            flags:
              - "-X"

        - id: quiet
          matcher:
            kind: any_flag
            flags:
              - "-q"
              - "--quiet"

        - id: exclude_pattern
          matcher:
            kind: any_flag
            flags:
              - "-e"
              - "--exclude"
          parameters:
            - name: exclude_pattern_value
              semantic:
                kind: plain_value
              binding:
                kind: following_matched_flag
                operand_mode: next_arg
              cardinality: required_one
      children: []
      default_behavior: reject_unknown
      extensions:
        caushell.profile/known_limitations:
          - git clean -e/--exclude narrows the actual candidate set, but the current effect model still records only the coarse untracked/ignored worktree scope rather than the post-filter exact path set.

    - name: reset
      aliases: []
      forms:
        - id: reset_hard_worktree
          selector:
            kind: all
            items:
              - kind: has_flag
                flag: "--hard"
              - kind: no_dash_dash
          remaining_selector:
            kind: no_positional_args
          parameters:
            - name: revision
              semantic:
                kind: plain_value
              binding:
                kind: positional_at
                index: 0
              cardinality: optional_one
          effects:
            - kind: write_path
              target:
                kind: mutation_scope
                scope_kind: repository_worktree
                root: working_directory
                path_set: tracked
            - kind: repository_operation
              target:
                kind: none
              repository_operation: tracked_worktree_discard
      modifiers: []
      children: []
      default_behavior: reject_unknown
      extensions: {}

    - name: restore
      aliases: []
      forms:
        - id: restore_staged_only
          selector:
            kind: all
            items:
              - kind: has_modifier
                modifier: staged
              - kind: not
                item:
                  kind: has_modifier
                  modifier: worktree
          remaining_selector:
            kind: no_positional_args
          parameters:
            - name: pathspecs
              semantic:
                kind: path
                role: target
                purpose: generic_operand
              binding:
                kind: remaining_positionals
              cardinality: required_many

        - id: restore_worktree_subtree
          selector:
            kind: all
            items:
              - kind: any
                items:
                  - kind: has_modifier
                    modifier: source
                  - kind: has_modifier
                    modifier: source_inline
              - kind: has_modifier
                modifier: worktree
              - kind: has_positional_at_matching
                index: 0
                matcher:
                  kind: literal
                  value: "."
          parameters:
            - name: subtree
              semantic:
                kind: path
                role: target
                purpose: generic_operand
              binding:
                kind: next_positional
              cardinality: required_one
          effects:
            - kind: write_path
              target:
                kind: mutation_scope
                scope_kind: repository_worktree
                path_set: tracked
                subtree: subtree
            - kind: repository_operation
              target:
                kind: none
              repository_operation: tracked_worktree_discard

        - id: restore_dashdash_pathspecs
          selector:
            kind: all
            items:
              - kind: has_dash_dash
              - kind: not
                item:
                  kind: all
                  items:
                    - kind: has_modifier
                      modifier: staged
                    - kind: not
                      item:
                        kind: has_modifier
                        modifier: worktree
          remaining_selector:
            kind: no_positional_args
          parameters:
            - name: pathspecs
              semantic:
                kind: path
                role: write
                purpose: generic_operand
              binding:
                kind: remaining_positionals_after_dash_dash
              cardinality: required_many
          effects:
            - kind: write_path
              target:
                kind: slot
                name: pathspecs
            - kind: repository_operation
              target:
                kind: none
              repository_operation: tracked_worktree_discard

        - id: restore_explicit_pathspecs
          selector:
            kind: all
            items:
              - kind: no_dash_dash
              - kind: has_positional_at
                index: 0
              - kind: not
                item:
                  kind: all
                  items:
                    - kind: has_modifier
                      modifier: staged
                    - kind: not
                      item:
                        kind: has_modifier
                        modifier: worktree
              - kind: not
                item:
                  kind: all
                  items:
                    - kind: any
                      items:
                        - kind: has_modifier
                          modifier: source
                        - kind: has_modifier
                          modifier: source_inline
                    - kind: has_flag
                      flag: "--worktree"
                    - kind: has_positional_at_matching
                      index: 0
                      matcher:
                        kind: literal
                        value: "."
          parameters:
            - name: pathspecs
              semantic:
                kind: path
                role: write
                purpose: generic_operand
              binding:
                kind: remaining_positionals
              cardinality: required_many
          effects:
            - kind: write_path
              target:
                kind: slot
                name: pathspecs
            - kind: repository_operation
              target:
                kind: none
              repository_operation: tracked_worktree_discard
      modifiers:
        - id: source
          matcher:
            kind: any_flag
            flags:
              - "-s"
              - "--source"
          parameters:
            - name: treeish
              semantic:
                kind: plain_value
              binding:
                kind: following_matched_flag
                operand_mode: next_arg
              cardinality: optional_one

        - id: source_inline
          matcher:
            kind: any_flag
            flags:
              - "-s"
              - "--source"
          parameters:
            - name: treeish_inline
              semantic:
                kind: plain_value
              binding:
                kind: following_matched_flag
                operand_mode: inline_only
              cardinality: optional_one

        - id: value_option
          matcher:
            kind: any_flag
            flags:
              - "--conflict"
          parameters:
            - name: option_value
              semantic:
                kind: plain_value
              binding:
                kind: following_matched_flag
                operand_mode: next_arg
              cardinality: optional_one

        - id: staged
          matcher:
            kind: any_flag
            flags:
              - "-S"
              - "--staged"

        - id: worktree
          matcher:
            kind: any_flag
            flags:
              - "-W"
              - "--worktree"

        - id: mode
          matcher:
            kind: any_flag
            flags:
              - "-p"
              - "--patch"
              - "-q"
              - "--quiet"
              - "--progress"
              - "--no-progress"
      children: []
      default_behavior: reject_unknown
      extensions: {}

    - name: checkout
      aliases: []
      forms:
        - id: checkout_treeish_pathspecs
          selector:
            kind: all
            items:
              - kind: has_dash_dash
              - kind: has_positional_before_dash_dash_at
                index: 0
          remaining_selector:
            kind: no_positional_args
          parameters:
            - name: treeish
              semantic:
                kind: plain_value
              binding:
                kind: positional_at
                index: 0
              cardinality: required_one
            - name: pathspecs
              semantic:
                kind: path
                role: write
                purpose: generic_operand
              binding:
                kind: remaining_positionals_after_dash_dash
              cardinality: required_many
          effects:
            - kind: write_path
              target:
                kind: slot
                name: pathspecs
            - kind: repository_operation
              target:
                kind: none
              repository_operation: tracked_worktree_discard

        - id: checkout_branch_worktree
          selector:
            kind: all
            items:
              - kind: no_dash_dash
              - kind: has_positional_at
                index: 0
              - kind: not
                item:
                  kind: has_positional_at
                  index: 1
          effects:
            - kind: write_path
              target:
                kind: mutation_scope
                scope_kind: repository_worktree
                path_set: tracked

        - id: checkout_explicit_pathspecs
          selector:
            kind: all
            items:
              - kind: has_dash_dash
              - kind: has_positional_at
                index: 0
              - kind: not
                item:
                  kind: has_positional_before_dash_dash_at
                  index: 0
          remaining_selector:
            kind: no_positional_args
          parameters:
            - name: pathspecs
              semantic:
                kind: path
                role: write
                purpose: generic_operand
              binding:
                kind: remaining_positionals_after_dash_dash
              cardinality: required_many
          effects:
            - kind: write_path
              target:
                kind: slot
                name: pathspecs
            - kind: repository_operation
              target:
                kind: none
              repository_operation: tracked_worktree_discard
      modifiers:
        - id: force
          matcher:
            kind: any_flag
            flags:
              - "-f"
              - "--force"
          effects:
            - kind: repository_operation
              target:
                kind: none
              repository_operation: forced_worktree_switch
      children: []
      default_behavior: reject_unknown
      extensions: {}

    - name: submodule
      aliases: []
      forms: []
      modifiers: []
      children:
        - name: update
          aliases: []
          forms:
            - id: update_registered_submodules
              selector:
                kind: all
                items:
                  - kind: has_flag
                    flag: "--init"
                  - kind: has_flag
                    flag: "--recursive"
              parameters:
                - name: pathspecs
                  semantic:
                    kind: path
                    role: target
                    purpose: generic_operand
                  binding:
                    kind: remaining_positionals_after_dash_dash
                  cardinality: optional_many
              effects:
                - kind: load_config
                  target:
                    kind: tool_convention_path
                    path: .gitmodules
                    convention: git.modules_config
                    purpose: tool_config
                - kind: load_config
                  target:
                    kind: tool_convention_path
                    path: .git/config
                    convention: git.local_config
                    purpose: tool_config
                - kind: write_path
                  target:
                    kind: mutation_scope
                    scope_kind: repository_worktree
                    path_set: registered_submodule_worktrees
          modifiers: []
          children: []
          default_behavior: reject_unknown
          extensions: {}
      default_behavior: reject_unknown
      extensions: {}
extensions:
  caushell.profile/known_limitations:
    - Clone only records an explicit destination path. The default basename destination and repository member writes remain tracked under the pending derived/default path effect capability.
    - Commit and am delegate git hook path materialization to the runtime path pass so effective hook roots can be resolved from git config precedence rather than hardcoded profile paths. Hook-stage coverage currently focuses on `git commit` and `git am`.
    - "`git apply` / `git am` now project mailbox or patch reads plus a coarse `patch_selected_tracked` repository-worktree write scope. The runtime still does not parse patch bodies into exact target-path sets."
    - "`git submodule update --init --recursive` now projects `.gitmodules` and `.git/config` reads plus a coarse `registered_submodule_worktrees` repository-worktree write scope. Nested submodule endpoint extraction and per-submodule checkout lineage are not yet materialized."
    - "`git clone --recurse-submodules` gets the richer submodule-control-plane modeling only in the explicit-destination slice. When clone falls back to Git's default basename destination, nested submodule root materialization and endpoint extraction remain outside the current honest profile surface."
