dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: base32
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: decode_stream
    selector:
      kind: has_modifier
      modifier: decode
    parameters:
      - name: input_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
        value_constraints:
          - kind: exclude_literal
            value: "-"
    stream_contract:
      stdin_mode: data_optional
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_paths
      - kind: transform_data
        target:
          kind: none
        extensions:
          transform.kind: decode

  - id: encode_stream
    selector:
      kind: not
      item:
        kind: has_modifier
        modifier: decode
    parameters:
      - name: input_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
        value_constraints:
          - kind: exclude_literal
            value: "-"
    stream_contract:
      stdin_mode: data_optional
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_paths
      - kind: transform_data
        target:
          kind: none
        extensions:
          transform.kind: encode

modifiers:
  - id: decode
    matcher:
      kind: any_flag
      flags:
        - "-d"
        - "--decode"

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/D4-security-bash/weaponizable_overlap.csv
