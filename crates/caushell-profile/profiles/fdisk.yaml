dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: fdisk
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: show_help
    selector:
      kind: any
      items:
        - kind: has_flag
          flag: "-h"
        - kind: has_flag
          flag: "--help"

  - id: show_version
    selector:
      kind: all
      items:
        - kind: any
          items:
            - kind: has_flag
              flag: "-V"
            - kind: has_flag
              flag: "--version"
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"

  - id: list_partition_tables
    selector:
      kind: all
      items:
        - kind: any
          items:
            - kind: has_modifier
              modifier: list
            - kind: has_modifier
              modifier: list_details
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "-V"
              - kind: has_flag
                flag: "--version"
    parameters:
      - name: device_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    effects:
      - kind: read_path
        target:
          kind: slot
          name: device_paths

  - id: inspect_device_size
    selector:
      kind: all
      items:
        - kind: has_modifier
          modifier: get_size
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "-V"
              - kind: has_flag
                flag: "--version"
    parameters:
      - name: target
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: next_positional
        cardinality: required_one
    effects:
      - kind: read_path
        target:
          kind: slot
          name: target

  - id: scripted_device_session
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: stdin_payload_available
        - kind: not
          item:
            kind: any
            items:
              - kind: has_modifier
                modifier: list
              - kind: has_modifier
                modifier: list_details
              - kind: has_modifier
                modifier: get_size
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "-V"
              - kind: has_flag
                flag: "--version"
    parameters:
      - name: target
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: next_positional
        cardinality: required_one
    implicit_inputs:
      - source: stdin_data
        semantic:
          kind: plain_value
    stream_contract:
      stdin_mode: data_required
      stdout_mode: opaque
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: target
      - kind: consume_stdin
        target:
          kind: implicit_input
          source: stdin_data

  - id: interactive_device_session
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: any
            items:
              - kind: has_modifier
                modifier: list
              - kind: has_modifier
                modifier: list_details
              - kind: has_modifier
                modifier: get_size
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "-V"
              - kind: has_flag
                flag: "--version"
              - kind: stdin_payload_available
    parameters:
      - name: target
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: next_positional
        cardinality: required_one
    effects:
      - kind: write_path
        target:
          kind: slot
          name: target
        host_risk:
          semantic_class: partition_table_session_target

modifiers:
  - id: sector_size
    matcher:
      kind: any_flag
      flags:
        - "-b"
        - "--sector-size"
    parameters:
      - name: sector_size_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: protect_boot
    matcher:
      kind: any_flag
      flags:
        - "-B"
        - "--protect-boot"

  - id: compatibility
    matcher:
      kind: any_flag
      flags:
        - "-c"
        - "--compatibility"
    parameters:
      - name: compatibility_mode
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: inline_or_short_attached
        cardinality: optional_one

  - id: color
    matcher:
      kind: any_flag
      flags:
        - "-L"
        - "--color"
    parameters:
      - name: color_mode
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: inline_or_short_attached
        cardinality: optional_one

  - id: list
    matcher:
      kind: any_flag
      flags:
        - "-l"
        - "--list"

  - id: list_details
    matcher:
      kind: any_flag
      flags:
        - "-x"
        - "--list-details"

  - id: noauto_pt
    matcher:
      kind: any_flag
      flags:
        - "-n"
        - "--noauto-pt"

  - id: output
    matcher:
      kind: any_flag
      flags:
        - "-o"
        - "--output"
    parameters:
      - name: output_columns
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: partition_table_type
    matcher:
      kind: any_flag
      flags:
        - "-t"
        - "--type"
    parameters:
      - name: partition_table_type_name
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: units
    matcher:
      kind: any_flag
      flags:
        - "-u"
        - "--units"
    parameters:
      - name: units_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: inline_or_short_attached
        cardinality: optional_one

  - id: get_size
    matcher:
      kind: any_flag
      flags:
        - "-s"
        - "--getsz"

  - id: bytes
    matcher:
      kind: any_flag
      flags:
        - "--bytes"

  - id: lock
    matcher:
      kind: any_flag
      flags:
        - "--lock"
    parameters:
      - name: lock_mode
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: inline_or_short_attached
        cardinality: optional_one

  - id: wipe
    matcher:
      kind: any_flag
      flags:
        - "-w"
        - "--wipe"
    parameters:
      - name: wipe_mode
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: inline_or_short_attached
        cardinality: optional_one

  - id: wipe_partitions
    matcher:
      kind: any_flag
      flags:
        - "-W"
        - "--wipe-partitions"
    parameters:
      - name: wipe_partitions_mode
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: inline_or_short_attached
        cardinality: optional_one

  - id: cylinders
    matcher:
      kind: any_flag
      flags:
        - "-C"
        - "--cylinders"
    parameters:
      - name: cylinders_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: heads
    matcher:
      kind: any_flag
      flags:
        - "-H"
        - "--heads"
    parameters:
      - name: heads_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: sectors
    matcher:
      kind: any_flag
      flags:
        - "-S"
        - "--sectors"
    parameters:
      - name: sectors_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: help
    matcher:
      kind: any_flag
      flags:
        - "-h"
        - "--help"

  - id: version
    matcher:
      kind: any_flag
      flags:
        - "-V"
        - "--version"

subcommands: null
extensions:
  caushell.profile/known_limitations:
    - The current profile models the outer `fdisk` invocation shape and stdin-fed command sessions, but destructive partition edits are still classified by the payload hard-deny pass because the stdin command language is not yet represented in the profile DSL.
