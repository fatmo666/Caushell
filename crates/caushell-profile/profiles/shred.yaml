dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: shred
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: show_help
    selector:
      kind: has_flag
      flag: "--help"

  - id: show_version
    selector:
      kind: all
      items:
        - kind: has_flag
          flag: "--version"
        - kind: not
          item:
            kind: has_flag
            flag: "--help"

  - id: overwrite_and_remove_targets
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: has_modifier
          modifier: remove_targets
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "--version"
    parameters:
      - name: path_targets
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: required_many
    effects:
      - kind: write_path
        target:
          kind: slot
          name: path_targets
        catastrophic:
          semantic_class: raw_write_target
      - kind: delete_path
        target:
          kind: slot
          name: path_targets
        catastrophic:
          semantic_class: delete_path

  - id: overwrite_targets
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: any
            items:
              - kind: has_modifier
                modifier: remove_targets
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "--version"
    parameters:
      - name: path_targets
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: required_many
    effects:
      - kind: write_path
        target:
          kind: slot
          name: path_targets
        catastrophic:
          semantic_class: raw_write_target

modifiers:
  - id: force
    matcher:
      kind: any_flag
      flags:
        - "-f"
        - "--force"

  - id: iterations
    matcher:
      kind: any_flag
      flags:
        - "-n"
        - "--iterations"
    parameters:
      - name: iteration_count
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: random_source
    matcher:
      kind: any_flag
      flags:
        - "--random-source"
    parameters:
      - name: random_source_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one
    effects:
      - kind: read_path
        target:
          kind: slot
          name: random_source_path

  - id: size
    matcher:
      kind: any_flag
      flags:
        - "-s"
        - "--size"
    parameters:
      - name: size_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: remove_targets
    matcher:
      kind: any_flag
      flags:
        - "-u"
        - "--remove"
    parameters:
      - name: remove_how
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: inline_only
        cardinality: optional_one

  - id: verbose
    matcher:
      kind: any_flag
      flags:
        - "-v"
        - "--verbose"

  - id: exact
    matcher:
      kind: any_flag
      flags:
        - "-x"
        - "--exact"

  - id: zero
    matcher:
      kind: any_flag
      flags:
        - "-z"
        - "--zero"

  - id: help
    matcher:
      kind: any_flag
      flags:
        - "--help"

  - id: version
    matcher:
      kind: any_flag
      flags:
        - "--version"

subcommands: null
extensions: {}
