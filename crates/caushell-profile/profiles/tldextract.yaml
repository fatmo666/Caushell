dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: tldextract
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: extract_domains
    selector:
      kind: all
      items: []
    parameters:
      - name: inputs
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    stream_contract:
      stdin_mode: data_optional
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: network_endpoint
        target:
          kind: none
      - kind: write_path
        target:
          kind: tool_convention_path
          path: .cache/python-tldextract
          convention: tldextract.cache_dir
          purpose: tool_config
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: suffix_list_url
    matcher:
      kind: any_flag
      flags:
        - "--suffix-list-url"
    parameters:
      - name: suffix_list_endpoint
        semantic:
          kind: endpoint
          endpoint_kind: url
          usage: fetch_source
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: network_endpoint
        target:
          kind: slot
          name: suffix_list_endpoint

  - id: cache_dir
    matcher:
      kind: any_flag
      flags:
        - "--cache-dir"
    parameters:
      - name: cache_dir
        semantic:
          kind: path
          role: write
          purpose: tool_config
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: write_path
        target:
          kind: slot
          name: cache_dir

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
  caushell.profile/known_limitations:
    - Cache refresh is conservatively represented as network plus cache write even when a local cache may satisfy the request.
