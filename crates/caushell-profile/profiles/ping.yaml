dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: ping
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: probe_host
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: endpoint
        semantic:
          kind: endpoint
          endpoint_kind: host_port
          usage: generic_endpoint
        binding:
          kind: last_positional
        cardinality: required_one
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: network_endpoint
        target:
          kind: slot
          name: endpoint
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: count
    matcher:
      kind: any_flag
      flags:
        - "-c"
    parameters:
      - name: count
        semantic:
          kind: structured_value
          context: numeric_quantity
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
