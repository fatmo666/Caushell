dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: apropos
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: search_manual_database
    selector:
      kind: all
      items: []
    parameters:
      - name: query
        semantic:
          kind: structured_value
          context: regex
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    effects:
      - kind: read_path
        target:
          kind: tool_convention_path
          path: man
          convention: manpage.search_path
          purpose: generic_operand
      - kind: transform_data
        target:
          kind: none

modifiers: []
subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
