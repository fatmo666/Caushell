dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: mount
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: list_mounts
    selector:
      kind: no_positional_args
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: tool_convention_path
          path: /proc/self/mounts
          convention: mount.current_table
          purpose: generic_operand
      - kind: transform_data
        target:
          kind: none

  - id: mount_filesystem
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: source
        semantic:
          kind: path
          role: target
          purpose: generic_operand
        binding:
          kind: remaining_positionals_before_last
        cardinality: optional_many
      - name: mount_point
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: last_positional
        cardinality: required_one
    effects:
      - kind: target_path
        target:
          kind: slot
          name: source
      - kind: write_path
        target:
          kind: slot
          name: mount_point
      - kind: metadata_mutation
        target:
          kind: none

modifiers:
  - id: type
    matcher:
      kind: any_flag
      flags:
        - "-t"
        - "--types"
    parameters:
      - name: filesystem_type
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

  - id: options
    matcher:
      kind: any_flag
      flags:
        - "-o"
        - "--options"
    parameters:
      - name: mount_options
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
  caushell.profile/known_limitations:
    - Mount table mutation is modeled as metadata mutation plus mount-point write target; device-specific filesystem semantics are not expanded.
