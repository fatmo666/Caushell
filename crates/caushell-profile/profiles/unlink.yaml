dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: unlink
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: unlink_path
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: path_target
        semantic:
          kind: path
          role: target
          purpose: generic_operand
        binding:
          kind: next_positional
        cardinality: required_one
    effects:
      - kind: delete_path
        target:
          kind: slot
          name: path_target
        catastrophic:
          semantic_class: delete_path

modifiers: []
subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
