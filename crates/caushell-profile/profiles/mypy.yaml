dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: mypy
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: type_check_project
    selector:
      kind: all
      items: []
    parameters:
      - name: input_targets
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_targets
      - kind: write_path
        target:
          kind: tool_convention_path
          path: .mypy_cache
          convention: mypy.default_cache
          purpose: tool_config

modifiers:
  - id: config_file
    matcher:
      kind: any_flag
      flags:
        - "--config-file"
    parameters:
      - name: config_path
        semantic:
          kind: path
          role: config
          purpose: tool_config
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: load_config
        target:
          kind: slot
          name: config_path

  - id: cache_dir
    matcher:
      kind: any_flag
      flags:
        - "--cache-dir"
    parameters:
      - name: cache_dir
        semantic:
          kind: path
          role: write
          purpose: tool_config
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: write_path
        target:
          kind: slot
          name: cache_dir

  - id: report_directory
    matcher:
      kind: any_flag
      flags:
        - "--html-report"
        - "--xml-report"
        - "--txt-report"
        - "--linecount-report"
        - "--linecoverage-report"
        - "--any-exprs-report"
        - "--cobertura-xml-report"
    parameters:
      - name: report_directory
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many
    effects:
      - kind: write_path
        target:
          kind: slot
          name: report_directory

  - id: junit_xml_output
    matcher:
      kind: any_flag
      flags:
        - "--junit-xml"
    parameters:
      - name: junit_xml_output
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: write_path
        target:
          kind: slot
          name: junit_xml_output

  - id: install_types
    matcher:
      kind: any_flag
      flags:
        - "--install-types"
    effects:
      - kind: execute_imported_package_logic
        target:
          kind: none

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
    - command-frequency/D4-security-bash/weaponizable_overlap.csv
  caushell.profile/known_limitations:
    - Mypy plugin imports from configuration are represented as config load, not resolved to plugin modules yet.
