dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: dircolors
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: generate_ls_colors
    selector:
      kind: all
      items: []
    parameters:
      - name: config_paths
        semantic:
          kind: path
          role: config
          purpose: tool_config
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: config_paths
      - kind: transform_data
        target:
          kind: none

modifiers: []
subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
