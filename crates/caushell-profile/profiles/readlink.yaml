dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: readlink
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: resolve_links
    selector:
      kind: all
      items: []
    parameters:
      - name: path_targets
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: path_list
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: path_targets
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: canonicalize
    matcher:
      kind: any_flag
      flags:
        - "-f"
        - "-e"
        - "-m"
        - "--canonicalize"
        - "--canonicalize-existing"
        - "--canonicalize-missing"

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
