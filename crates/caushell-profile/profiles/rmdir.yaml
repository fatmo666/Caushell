dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: rmdir
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: remove_empty_directories
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: path_targets
        semantic:
          kind: path
          role: target
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: required_many
    effects:
      - kind: delete_path
        target:
          kind: slot
          name: path_targets
        catastrophic:
          semantic_class: delete_path

modifiers:
  - id: parents
    matcher:
      kind: any_flag
      flags:
        - "-p"
        - "--parents"

  - id: ignore_non_empty
    matcher:
      kind: any_flag
      flags:
        - "--ignore-fail-on-non-empty"

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
