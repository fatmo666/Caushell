dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: sudo
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families:
    - bourne
    - bash
    - sh
    - dash
  requires_features: []

forms:
  - id: wrapped_command
    selector:
      kind: all
      items:
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-e"
              - kind: has_flag
                flag: "--edit"
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "-i"
              - kind: has_flag
                flag: "--login"
              - kind: has_flag
                flag: "-K"
              - kind: has_flag
                flag: "--remove-timestamp"
              - kind: has_flag
                flag: "-k"
              - kind: has_flag
                flag: "--reset-timestamp"
              - kind: has_flag
                flag: "-l"
              - kind: has_flag
                flag: "--list"
              - kind: has_flag
                flag: "-s"
              - kind: has_flag
                flag: "--shell"
              - kind: has_flag
                flag: "-V"
              - kind: has_flag
                flag: "--version"
              - kind: has_flag
                flag: "-v"
              - kind: has_flag
                flag: "--validate"
        - kind: has_positional_after_leading_matcher
          matcher:
            kind: structured_value_context
            context: env_assignment
    parameters:
      - name: scoped_env
        semantic:
          kind: structured_value
          context: env_assignment
        binding:
          kind: leading_positionals_while
          matcher:
            kind: structured_value_context
            context: env_assignment
        cardinality: optional_many
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: privilege_modifier
        target:
          kind: none
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment:
            - scoped_env

modifiers:
  - id: askpass
    matcher:
      kind: any_flag
      flags:
        - "-A"
        - "--askpass"

  - id: background
    matcher:
      kind: any_flag
      flags:
        - "-b"
        - "--background"

  - id: bell
    matcher:
      kind: any_flag
      flags:
        - "-B"
        - "--bell"

  - id: close_from
    matcher:
      kind: any_flag
      flags:
        - "-C"
        - "--close-from"
    parameters:
      - name: close_from_fd
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: chdir
    matcher:
      kind: any_flag
      flags:
        - "-D"
        - "--chdir"
    parameters:
      - name: working_directory
        semantic:
          kind: path
          role: cwd_anchor
          purpose: working_directory
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one
    effects:
      - kind: target_path
        target:
          kind: slot
          name: working_directory

  - id: preserve_env
    matcher:
      kind: any_flag
      flags:
        - "-E"
        - "--preserve-env"

  - id: group
    matcher:
      kind: any_flag
      flags:
        - "-g"
        - "--group"
    parameters:
      - name: run_as_group
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: set_home
    matcher:
      kind: any_flag
      flags:
        - "-H"
        - "--set-home"

  - id: non_interactive
    matcher:
      kind: any_flag
      flags:
        - "-n"
        - "--non-interactive"

  - id: preserve_groups
    matcher:
      kind: any_flag
      flags:
        - "-P"
        - "--preserve-groups"

  - id: prompt
    matcher:
      kind: any_flag
      flags:
        - "-p"
        - "--prompt"
    parameters:
      - name: prompt_text
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: chroot
    matcher:
      kind: any_flag
      flags:
        - "-R"
        - "--chroot"
    parameters:
      - name: chroot_directory
        semantic:
          kind: path
          role: target
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one
    effects:
      - kind: target_path
        target:
          kind: slot
          name: chroot_directory

  - id: stdin_password
    matcher:
      kind: any_flag
      flags:
        - "-S"
        - "--stdin"

  - id: role
    matcher:
      kind: any_flag
      flags:
        - "-r"
        - "--role"
    parameters:
      - name: target_role
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: type
    matcher:
      kind: any_flag
      flags:
        - "-t"
        - "--type"
    parameters:
      - name: target_type
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: command_timeout
    matcher:
      kind: any_flag
      flags:
        - "-T"
        - "--command-timeout"
    parameters:
      - name: timeout_spec
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: user
    matcher:
      kind: any_flag
      flags:
        - "-u"
        - "--user"
    parameters:
      - name: run_as_user
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: host
    matcher:
      kind: any_flag
      flags:
        - "--host"
    parameters:
      - name: target_host
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

subcommands: null
extensions: {}
