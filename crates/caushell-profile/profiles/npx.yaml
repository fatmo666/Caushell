dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: npx
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: exec_package_from_modifier
    selector:
      kind: has_modifier
      modifier: package
    parameters:
      - name: exec_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many

  - id: exec_package
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: has_modifier
            modifier: package
    parameters:
      - name: package_specs
        semantic:
          kind: package_locator
          manager: npm
          locator_kinds:
            - registry_ref
            - local_path
            - direct_url
            - vcs_url
            - unknown_dynamic
        binding:
          kind: next_positional
        cardinality: required_one
      - name: exec_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: import_package
        target:
          kind: slot
          name: package_specs
      - kind: execute_imported_package_logic
        target:
          kind: slot
          name: package_specs

modifiers:
  - id: package
    matcher:
      kind: any_flag
      flags:
        - "--package"
        - "-p"
    parameters:
      - name: package_specs
        semantic:
          kind: package_locator
          manager: npm
          locator_kinds:
            - registry_ref
            - local_path
            - direct_url
            - vcs_url
            - unknown_dynamic
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_many
    effects:
      - kind: import_package
        target:
          kind: slot
          name: package_specs
      - kind: execute_imported_package_logic
        target:
          kind: slot
          name: package_specs

  - id: exec_flag
    matcher:
      kind: any_flag
      flags:
        - "-y"
        - "--yes"
        - "--no"
        - "--ignore-existing"

  - id: exec_value_option
    matcher:
      kind: any_flag
      flags:
        - "--registry"
        - "--cache"
        - "--prefix"
        - "--userconfig"
    parameters:
      - name: option_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_many

subcommands: null
extensions:
  caushell.profile/known_limitations:
    - npx is modeled as npm package execution; bin resolution and package manifest contents are not expanded.
