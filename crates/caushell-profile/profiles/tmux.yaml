dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: tmux
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: terminal_multiplexer_control
    selector:
      kind: all
      items: []
    parameters:
      - name: arguments
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: load_config
        target:
          kind: tool_convention_path
          path: .tmux.conf
          convention: tmux.config
          purpose: tool_config
      - kind: open_interactive_escape_surface
        target:
          kind: none
        surface:
          kind: terminal_ui
          requires_tty: false
          capabilities:
            - spawn_shell
            - run_command

modifiers:
  - id: command
    matcher:
      kind: any_flag
      flags:
        - "-f"
    parameters:
      - name: config_path
        semantic:
          kind: path
          role: config
          purpose: tool_config
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: load_config
        target:
          kind: slot
          name: config_path

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
