dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: unshare
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - linux
  shell_families: []
  requires_features: []

forms:
  - id: wrapped_command
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "--version"
    parameters:
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment: []

modifiers:
  - id: mount_namespace
    matcher:
      kind: any_flag
      flags:
        - "-m"
        - "--mount"

  - id: uts_namespace
    matcher:
      kind: any_flag
      flags:
        - "-u"
        - "--uts"

  - id: ipc_namespace
    matcher:
      kind: any_flag
      flags:
        - "-i"
        - "--ipc"

  - id: net_namespace
    matcher:
      kind: any_flag
      flags:
        - "-n"
        - "--net"

  - id: pid_namespace
    matcher:
      kind: any_flag
      flags:
        - "-p"
        - "--pid"

  - id: user_namespace
    matcher:
      kind: any_flag
      flags:
        - "-U"
        - "--user"

  - id: cgroup_namespace
    matcher:
      kind: any_flag
      flags:
        - "-C"
        - "--cgroup"

  - id: time_namespace
    matcher:
      kind: any_flag
      flags:
        - "-T"
        - "--time"

  - id: fork
    matcher:
      kind: any_flag
      flags:
        - "-f"
        - "--fork"

  - id: map_root_user
    matcher:
      kind: any_flag
      flags:
        - "-r"
        - "--map-root-user"

  - id: map_current_user
    matcher:
      kind: any_flag
      flags:
        - "-c"
        - "--map-current-user"

  - id: map_auto
    matcher:
      kind: any_flag
      flags:
        - "--map-auto"

  - id: keep_caps
    matcher:
      kind: any_flag
      flags:
        - "--keep-caps"

  - id: root
    matcher:
      kind: any_flag
      flags:
        - "-R"
        - "--root"
    parameters:
      - name: root_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: working_directory
    matcher:
      kind: any_flag
      flags:
        - "-w"
        - "--wd"
    parameters:
      - name: working_directory
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: setuid
    matcher:
      kind: any_flag
      flags:
        - "-S"
        - "--setuid"
    parameters:
      - name: uid
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: setgid
    matcher:
      kind: any_flag
      flags:
        - "-G"
        - "--setgid"
    parameters:
      - name: gid
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: map_user
    matcher:
      kind: any_flag
      flags:
        - "--map-user"
    parameters:
      - name: uid
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: map_group
    matcher:
      kind: any_flag
      flags:
        - "--map-group"
    parameters:
      - name: gid
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: map_users
    matcher:
      kind: any_flag
      flags:
        - "--map-users"
    parameters:
      - name: mapping
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: map_groups
    matcher:
      kind: any_flag
      flags:
        - "--map-groups"
    parameters:
      - name: mapping
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: propagation
    matcher:
      kind: any_flag
      flags:
        - "--propagation"
    parameters:
      - name: propagation_mode
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: setgroups
    matcher:
      kind: any_flag
      flags:
        - "--setgroups"
    parameters:
      - name: setgroups_mode
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: mount_proc
    matcher:
      kind: any_flag
      flags:
        - "--mount-proc"
    parameters:
      - name: mount_proc_path
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: inline_only
        cardinality: optional_one

  - id: kill_child
    matcher:
      kind: any_flag
      flags:
        - "--kill-child"
    parameters:
      - name: signal
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: inline_only
        cardinality: optional_one

  - id: help
    matcher:
      kind: any_flag
      flags:
        - "-h"
        - "--help"

  - id: version
    matcher:
      kind: any_flag
      flags:
        - "-V"
        - "--version"

subcommands: null
extensions:
  caushell.profile/known_limitations:
    - Root-directory remapping via --root is recorded as an option path but does not yet project an alternate filesystem root for the dispatched child.
