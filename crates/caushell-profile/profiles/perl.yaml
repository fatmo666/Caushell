dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: perl
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: command_string
    selector:
      kind: has_flag
      flag: "-e"
    parameters:
      - name: payload
        semantic:
          kind: payload
          language: perl
          source: inline_string
          recursive: true
        binding:
          kind: following_flag
          flag: "-e"
          operand_mode: next_positional_after_dashdash
        cardinality: required_one
    effects:
      - kind: execute_payload
        target:
          kind: slot
          name: payload

  - id: script_file
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: has_flag
            flag: "-e"
    parameters:
      - name: script_path
        semantic:
          kind: path
          role: read
          purpose: script_source
        binding:
          kind: next_positional
        cardinality: required_one
      - name: script_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: read_path
        target:
          kind: slot
          name: script_path
      - kind: execute_payload
        target:
          kind: slot
          name: script_path

  - id: stdin_script
    selector:
      kind: all
      items:
        - kind: no_positional_args
        - kind: not
          item:
            kind: has_flag
            flag: "-e"
        - kind: stdin_payload_available
    implicit_inputs:
      - source: stdin_payload
        semantic:
          kind: payload
          language: perl
          source: stdin
          recursive: true
    stream_contract:
      stdin_mode: payload_required
      stdout_mode: opaque
      stderr_mode: opaque
    effects:
      - kind: consume_stdin
        target:
          kind: implicit_input
          source: stdin_payload
      - kind: execute_payload
        target:
          kind: implicit_input
          source: stdin_payload

modifiers:
  - id: module_import
    matcher:
      kind: any_flag
      flags:
        - "-M"
        - "-m"
    parameters:
      - name: module_specs
        semantic:
          kind: in_process_code_load
          load_kind: module_name
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_many
    effects:
      - kind: load_in_process_code
        target:
          kind: slot
          name: module_specs

  - id: include_path
    matcher:
      kind: any_flag
      flags:
        - "-I"
    parameters:
      - name: include_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_many
    effects:
      - kind: read_path
        target:
          kind: slot
          name: include_paths

subcommands: null
extensions:
  caushell.profile/known_limitations:
    - Perl inline and stdin payloads are recorded as nested payloads, but they are not recursively parsed by the current Bash-oriented parser.
