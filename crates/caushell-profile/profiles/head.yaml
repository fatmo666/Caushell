dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: head
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: read_inputs
    selector:
      kind: all
      items: []
    parameters:
      - name: input_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
        value_constraints:
          - kind: exclude_literal
            value: "-"
    stream_contract:
      stdin_mode: data_optional
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_paths

modifiers:
  - id: bytes
    matcher:
      kind: any_flag
      flags:
        - "-c"
        - "--bytes"
    parameters:
      - name: byte_count
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: lines
    matcher:
      kind: any_flag
      flags:
        - "-n"
        - "--lines"
    parameters:
      - name: line_count
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: quiet
    matcher:
      kind: any_flag
      flags:
        - "-q"
        - "--quiet"
        - "--silent"

  - id: verbose
    matcher:
      kind: any_flag
      flags:
        - "-v"
        - "--verbose"

  - id: zero_terminated
    matcher:
      kind: any_flag
      flags:
        - "-z"
        - "--zero-terminated"

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/TODO_COVERAGE_CHECKLIST.md
    - command-frequency/cross-validation/analysis.md
  caushell.profile/known_limitations:
    - FILE value "-" is treated as a non-path stdin sentinel, but the profile does not yet materialize mixed stdin-plus-file input as an explicit implicit input fact.
    - Short option attached operands such as -n5 and -c10 are not split by the current projection layer.
