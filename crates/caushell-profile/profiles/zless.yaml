dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: zless
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: page_compressed_files
    selector:
      kind: all
      items: []
    parameters:
      - name: input_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_paths
      - kind: open_interactive_escape_surface
        target:
          kind: none
        surface:
          kind: pager
          requires_tty: false
          capabilities:
            - spawn_shell
            - run_command

modifiers: []
subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
