dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: env
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: dispatch_with_env
    selector:
      kind: all
      items:
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-S"
              - kind: has_flag
                flag: "--split-string"
        - kind: has_positional_after_leading_matcher
          matcher:
            kind: structured_value_context
            context: env_assignment
    parameters:
      - name: scoped_env
        semantic:
          kind: structured_value
          context: env_assignment
        binding:
          kind: leading_positionals_while
          matcher:
            kind: structured_value_context
            context: env_assignment
        cardinality: optional_many
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment:
            - scoped_env

  - id: print_environment
    selector:
      kind: all
      items:
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-S"
              - kind: has_flag
                flag: "--split-string"
        - kind: no_positional_after_leading_matcher
          matcher:
            kind: structured_value_context
            context: env_assignment
    parameters:
      - name: scoped_env
        semantic:
          kind: structured_value
          context: env_assignment
        binding:
          kind: leading_positionals_while
          matcher:
            kind: structured_value_context
            context: env_assignment
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque

modifiers:
  - id: ignore_environment
    matcher:
      kind: any_flag
      flags:
        - "-i"
        - "--ignore-environment"

  - id: null_output
    matcher:
      kind: any_flag
      flags:
        - "-0"
        - "--null"

  - id: unset
    matcher:
      kind: any_flag
      flags:
        - "-u"
        - "--unset"
    parameters:
      - name: unset_names
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

  - id: chdir
    matcher:
      kind: any_flag
      flags:
        - "-C"
        - "--chdir"
    parameters:
      - name: working_directory
        semantic:
          kind: path
          role: cwd_anchor
          purpose: working_directory
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one
    effects:
      - kind: target_path
        target:
          kind: slot
          name: working_directory

  - id: block_signal
    matcher:
      kind: any_flag
      flags:
        - "--block-signal"
    parameters:
      - name: blocked_signals
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

  - id: default_signal
    matcher:
      kind: any_flag
      flags:
        - "--default-signal"
    parameters:
      - name: defaulted_signals
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

  - id: ignore_signal
    matcher:
      kind: any_flag
      flags:
        - "--ignore-signal"
    parameters:
      - name: ignored_signals
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

  - id: list_signal_handling
    matcher:
      kind: any_flag
      flags:
        - "--list-signal-handling"

  - id: debug
    matcher:
      kind: any_flag
      flags:
        - "-v"
        - "--debug"

subcommands: null
extensions: {}
