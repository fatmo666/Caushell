dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: uname
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: print_system_name
    selector:
      kind: all
      items: []
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: fields
    matcher:
      kind: any_flag
      flags:
        - "-a"
        - "--all"
        - "-m"
        - "-n"
        - "-r"
        - "-s"
        - "-v"

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
