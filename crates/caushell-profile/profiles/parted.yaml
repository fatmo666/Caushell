        - kind: has_positional_at_matching
          index: 1
          matcher:
            kind: literal
            value: "help"
        - kind: not
          item:
            kind: has_positional_at
            index: 3
        - kind: not
          item:
            kind: has_modifier
            modifier: list_devices

  - id: quit_command
