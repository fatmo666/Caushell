dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: parted
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: show_help
    selector:
      kind: any
      items:
        - kind: has_flag
          flag: "-h"
        - kind: has_flag
          flag: "--help"

  - id: show_version
    selector:
      kind: all
      items:
        - kind: any
          items:
            - kind: has_flag
              flag: "-v"
            - kind: has_flag
              flag: "--version"
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"

  - id: list_devices
    selector:
      kind: has_modifier
      modifier: list_devices

  - id: print_device
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: has_positional_at_or_after_matching
          index: 1
          matcher:
            kind: literal
            value: "print"
        - kind: not
          item:
            kind: has_modifier
            modifier: list_devices
    parameters:
      - name: target
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: next_positional
        cardinality: required_one
    effects:
      - kind: read_path
        target:
          kind: slot
          name: target

  - id: align_check_device
