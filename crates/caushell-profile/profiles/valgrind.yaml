dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: valgrind
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: wrapped_command
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "-h"
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "--version"
    parameters:
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment: []

modifiers:
  - id: tool
    matcher:
      kind: any_flag
      flags:
        - "--tool"
    parameters:
      - name: tool_name
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: log_file
    matcher:
      kind: any_flag
      flags:
        - "--log-file"
        - "--xml-file"
    parameters:
      - name: output_path
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: suppressions
    matcher:
      kind: any_flag
      flags:
        - "--suppressions"
    parameters:
      - name: suppressions_path
        semantic:
          kind: path
          role: read
          purpose: tool_config
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one
    effects:
      - kind: load_config
        target:
          kind: slot
          name: suppressions_path

  - id: trace_children
    matcher:
      kind: any_flag
      flags:
        - "--trace-children"
        - "--child-silent-after-fork"
        - "--track-fds"
        - "--xml"
        - "--leak-check"
        - "--show-leak-kinds"
        - "--error-exitcode"
        - "--num-callers"
    parameters:
      - name: option_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: quiet
    matcher:
      kind: any_flag
      flags:
        - "-q"
        - "--quiet"

  - id: verbose
    matcher:
      kind: any_flag
      flags:
        - "-v"
        - "--verbose"

  - id: help
    matcher:
      kind: any_flag
      flags:
        - "-h"
        - "--help"

  - id: version
    matcher:
      kind: any_flag
      flags:
        - "--version"

subcommands: null
extensions:
  caushell.profile/known_limitations:
    - This profile focuses on Valgrind's immediate child command launch mode and common options that shift the command position.
