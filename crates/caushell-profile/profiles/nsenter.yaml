dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: nsenter
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - linux
  shell_families: []
  requires_features: []

forms:
  - id: wrapped_command
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: any
            items:
              - kind: has_flag
                flag: "--help"
              - kind: has_flag
                flag: "--version"
    parameters:
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment: []

modifiers:
  - id: target
    matcher:
      kind: any_flag
      flags:
        - "-t"
        - "--target"
    parameters:
      - name: pid
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: namespace_all
    matcher:
      kind: any_flag
      flags:
        - "-a"
        - "--all"

  - id: namespace_file
    matcher:
      kind: any_flag
      flags:
        - "-m"
        - "--mount"
        - "-u"
        - "--uts"
        - "-i"
        - "--ipc"
        - "-n"
        - "--net"
        - "-p"
        - "--pid"
        - "-C"
        - "--cgroup"
        - "-U"
        - "--user"
        - "-T"
        - "--time"
    parameters:
      - name: namespace_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: inline_only
        cardinality: optional_one

  - id: no_fork
    matcher:
      kind: any_flag
      flags:
        - "-F"
        - "--no-fork"

  - id: setuid
    matcher:
      kind: any_flag
      flags:
        - "-S"
        - "--setuid"
    parameters:
      - name: uid
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: setgid
    matcher:
      kind: any_flag
      flags:
        - "-G"
        - "--setgid"
    parameters:
      - name: gid
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: root
    matcher:
      kind: any_flag
      flags:
        - "-r"
        - "--root"
    parameters:
      - name: root_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: inline_only
        cardinality: optional_one

  - id: working_directory
    matcher:
      kind: any_flag
      flags:
        - "-w"
        - "--wd"
        - "-W"
        - "--wdns"
    parameters:
      - name: working_directory
        semantic:
          kind: path
          role: read
          purpose: working_directory
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: help
    matcher:
      kind: any_flag
      flags:
        - "-h"
        - "--help"

  - id: version
    matcher:
      kind: any_flag
      flags:
        - "-V"
        - "--version"

subcommands: null
extensions:
  caushell.profile/known_limitations:
    - Namespace root remapping options are recorded as option paths but do not yet project an alternate filesystem root for the dispatched child.
