dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: echo
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: emit_arguments
    selector:
      kind: all
      items: []
    parameters:
      - name: arguments
        semantic:
          kind: plain_value
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: suppress_trailing_newline
    matcher:
      kind: any_flag
      flags:
        - "-n"

  - id: interpret_escapes
    matcher:
      kind: any_flag
      flags:
        - "-e"

  - id: literal_escapes
    matcher:
      kind: any_flag
      flags:
        - "-E"

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
  caushell.profile/known_limitations:
    - Shell redirection is intentionally modeled outside this argv profile; echo output must not be treated as safe when redirected to a path.
