dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: ssh
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: interactive_remote_session
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: not
          item:
            kind: has_positional_at
            index: 1
    parameters:
      - name: remote_host
        semantic:
          kind: endpoint
          endpoint_kind: host_port
          usage: control_plane
        binding:
          kind: next_positional
        cardinality: required_one
    effects:
      - kind: network_endpoint
        target:
          kind: slot
          name: remote_host
      - kind: execute_remote_command
        target:
          kind: none

  - id: remote_command
    selector:
      kind: has_positional_at
      index: 1
    parameters:
      - name: remote_host
        semantic:
          kind: endpoint
          endpoint_kind: host_port
          usage: control_plane
        binding:
          kind: next_positional
        cardinality: required_one
      - name: remote_command
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: required_many
    effects:
      - kind: network_endpoint
        target:
          kind: slot
          name: remote_host
      - kind: execute_remote_command
        target:
          kind: slot
          name: remote_command

modifiers:
  - id: port
    matcher:
      kind: any_flag
      flags:
        - "-p"
    parameters:
      - name: port
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one

  - id: identity_file
    matcher:
      kind: any_flag
      flags:
        - "-i"
    parameters:
      - name: identity_file
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one
    effects:
      - kind: read_path
        target:
          kind: slot
          name: identity_file

  - id: config_file
    matcher:
      kind: any_flag
      flags:
        - "-F"
    parameters:
      - name: config_file
        semantic:
          kind: path
          role: config
          purpose: tool_config
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one
    effects:
      - kind: load_config
        target:
          kind: slot
          name: config_file

subcommands: null
extensions:
  caushell.profile/known_limitations:
    - Remote commands are surfaced as remote execution semantics and are intentionally not recursively parsed as local shell payload.
    - This profile does not yet model ssh config includes, ProxyCommand, or agent-forwarded remote-side execution chains.
