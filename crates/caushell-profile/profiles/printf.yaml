dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: printf
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: emit_formatted_arguments
    selector:
      kind: all
      items: []
    parameters:
      - name: format_string
        semantic:
          kind: structured_value
          context: format_string
        binding:
          kind: next_positional
        cardinality: optional_one
      - name: arguments
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: transform_data
        target:
          kind: none

modifiers: []
subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
  caushell.profile/known_limitations:
    - Shell redirection is intentionally modeled outside this argv profile; printf output must not be treated as safe when redirected to a path.
