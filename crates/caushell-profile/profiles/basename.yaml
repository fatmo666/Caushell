dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: basename
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: extract_basename
    selector:
      kind: all
      items: []
    parameters:
      - name: path_values
        semantic:
          kind: structured_value
          context: path_expression
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: path_list
      stderr_mode: opaque
    effects:
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: suffix
    matcher:
      kind: any_flag
      flags:
        - "-s"
        - "--suffix"
    parameters:
      - name: suffix
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
