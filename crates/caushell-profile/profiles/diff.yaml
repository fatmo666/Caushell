dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: diff
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: compare_paths
    selector:
      kind: all
      items: []
    parameters:
      - name: input_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
        value_constraints:
          - kind: exclude_literal
            value: "-"
    stream_contract:
      stdin_mode: data_optional
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_paths
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: format
    matcher:
      kind: any_flag
      flags:
        - "-u"
        - "--unified"
        - "-c"
        - "-e"
        - "-n"
        - "-q"
        - "--brief"
        - "-s"
        - "--report-identical-files"

  - id: recursive
    matcher:
      kind: any_flag
      flags:
        - "-r"
        - "--recursive"
        - "-N"
        - "--new-file"

  - id: label
    matcher:
      kind: any_flag
      flags:
        - "-L"
        - "--label"
        - "-x"
        - "--exclude"
        - "-I"
        - "--ignore-matching-lines"
    parameters:
      - name: label_or_pattern
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

  - id: file_anchor
    matcher:
      kind: any_flag
      flags:
        - "--from-file"
        - "--to-file"
    parameters:
      - name: anchor_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many
    effects:
      - kind: read_path
        target:
          kind: slot
          name: anchor_paths

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
    - command-frequency/D4-security-bash/weaponizable_overlap.csv
