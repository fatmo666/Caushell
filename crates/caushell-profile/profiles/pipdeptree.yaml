dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: pipdeptree
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: inspect_environment
    selector:
      kind: all
      items: []
    parameters:
      - name: arguments
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: tool_convention_path
          path: site-packages
          convention: python.site_packages_metadata
          purpose: generic_operand
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: package_filter
    matcher:
      kind: any_flag
      flags:
        - "-p"
        - "--packages"
        - "-e"
        - "--exclude"
    parameters:
      - name: package_names
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
