dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: sync
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: flush_filesystem_buffers
    selector:
      kind: all
      items: []
    parameters:
      - name: path_targets
        semantic:
          kind: path
          role: target
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    effects:
      - kind: target_path
        target:
          kind: slot
          name: path_targets
      - kind: metadata_mutation
        target:
          kind: none

modifiers:
  - id: data
    matcher:
      kind: any_flag
      flags:
        - "-d"
        - "--data"

  - id: file_system
    matcher:
      kind: any_flag
      flags:
        - "-f"
        - "--file-system"

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
