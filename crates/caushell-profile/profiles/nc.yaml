dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: nc
  aliases:
    - netcat
    - ncat

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: network_session
    selector:
      kind: all
      items: []
    parameters:
      - name: remote_endpoint
        semantic:
          kind: endpoint
          endpoint_kind: host_port
          usage: generic_endpoint
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: data_optional
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: network_endpoint
        target:
          kind: slot
          name: remote_endpoint

modifiers:
  - id: listen
    matcher:
      kind: any_flag
      flags:
        - "-l"
        - "--listen"

  - id: execute_command
    matcher:
      kind: any_flag
      flags:
        - "-e"
        - "-c"
        - "--exec"
        - "--sh-exec"
    parameters:
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command

  - id: unix_socket
    matcher:
      kind: any_flag
      flags:
        - "-U"
        - "--unixsock"

  - id: timeout
    matcher:
      kind: any_flag
      flags:
        - "-w"
        - "--wait"
        - "-q"
        - "-i"
    parameters:
      - name: numeric_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
    - command-frequency/D4-security-bash/weaponizable_overlap.csv
  caushell.profile/known_limitations:
    - Netcat dialects differ; this profile intentionally marks execution and endpoint surfaces without trying to prove dialect-specific availability.
