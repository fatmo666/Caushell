dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: chcon
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - linux
  shell_families: []
  requires_features: []

forms:
  - id: reference_context
    selector:
      kind: all
      items:
        - kind: has_modifier
          modifier: reference
        - kind: has_positional_at
          index: 0
    parameters:
      - name: path_targets
        semantic:
          kind: path
          role: metadata_mutation
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: required_many
    effects:
      - kind: metadata_mutation
        target:
          kind: slot
          name: path_targets

  - id: change_security_context
    selector:
      kind: has_positional_at
      index: 1
    parameters:
      - name: context_spec
        semantic:
          kind: plain_value
        binding:
          kind: next_positional
        cardinality: required_one
      - name: path_targets
        semantic:
          kind: path
          role: metadata_mutation
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: required_many
    effects:
      - kind: metadata_mutation
        target:
          kind: slot
          name: path_targets
        extensions:
          metadata_mutation.raw_operand_slot: context_spec

modifiers:
  - id: recursive
    matcher:
      kind: any_flag
      flags:
        - "-R"
        - "--recursive"
    effects:
      - kind: metadata_mutation
        target:
          kind: slot
          name: path_targets
        extensions:
          metadata_mutation.recursive: true

  - id: reference
    matcher:
      kind: any_flag
      flags:
        - "--reference"
    parameters:
      - name: reference_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: required_one
    effects:
      - kind: read_path
        target:
          kind: slot
          name: reference_path

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
