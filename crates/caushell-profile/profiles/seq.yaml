dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: seq
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: generate_sequence
    selector:
      kind: all
      items: []
    parameters:
      - name: sequence_values
        semantic:
          kind: structured_value
          context: numeric_quantity
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: format
    matcher:
      kind: any_flag
      flags:
        - "-f"
        - "--format"
    parameters:
      - name: format_string
        semantic:
          kind: structured_value
          context: format_string
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
