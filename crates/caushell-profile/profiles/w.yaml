dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: w
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: list_logged_in_users
    selector:
      kind: all
      items: []
    stream_contract:
      stdin_mode: ignored
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: tool_convention_path
          path: /var/run/utmp
          convention: system.login_records
          purpose: generic_operand
      - kind: transform_data
        target:
          kind: none

modifiers: []
subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
