dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: pip
  aliases:
    - pip3

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms: []
modifiers: []

subcommands:
  roots:
    - name: install
      aliases: []
      forms:
        - id: install_packages
          selector:
            kind: any
            items:
              - kind: has_positional_at
                index: 0
              - kind: has_modifier
                modifier: requirement_file
              - kind: has_modifier
                modifier: editable_package
          parameters:
            - name: package_specs
              semantic:
                kind: package_locator
                manager: pip
                locator_kinds:
                  - registry_ref
                  - local_path
                  - direct_url
                  - vcs_url
                  - unknown_dynamic
              binding:
                kind: remaining_positionals
              cardinality: optional_many
          effects:
            - kind: import_package
              target:
                kind: slot
                name: package_specs
            - kind: execute_imported_package_logic
              target:
                kind: slot
                name: package_specs
      modifiers:
        - id: requirement_file
          matcher:
            kind: any_flag
            flags:
              - "-r"
              - "--requirement"
          parameters:
            - name: requirement_files
              semantic:
                kind: package_locator
                manager: pip
                locator_kinds:
                  - requirement_file
                  - local_path
                  - unknown_dynamic
              binding:
                kind: following_matched_flag
                operand_mode: next_arg
              cardinality: required_many
          effects:
            - kind: import_package
              target:
                kind: slot
                name: requirement_files
            - kind: execute_imported_package_logic
              target:
                kind: slot
                name: requirement_files

        - id: editable_package
          matcher:
            kind: any_flag
            flags:
              - "-e"
              - "--editable"
          parameters:
            - name: editable_specs
              semantic:
                kind: package_locator
                manager: pip
                locator_kinds:
                  - local_path
                  - vcs_url
                  - direct_url
                  - unknown_dynamic
              binding:
                kind: following_matched_flag
                operand_mode: next_arg
              cardinality: optional_many
          effects:
            - kind: import_package
              target:
                kind: slot
                name: editable_specs
            - kind: execute_imported_package_logic
              target:
                kind: slot
                name: editable_specs

        - id: target_directory
          matcher:
            kind: any_flag
            flags:
              - "--target"
          parameters:
            - name: target_directory
              semantic:
                kind: path
                role: write
                purpose: generic_operand
              binding:
                kind: following_matched_flag
                operand_mode: next_arg
              cardinality: optional_one
          effects:
            - kind: write_path
              target:
                kind: slot
                name: target_directory
      children: []
      default_behavior: reject_unknown
      extensions: {}

extensions:
  caushell.profile/known_limitations:
    - This first slice models `pip install <package_specs...>`, `pip install -r/--requirement <file>`, editable installs, and explicit --target writes.
    - Index selection, wheel/build-option modifiers, build isolation, and dependency contents are not modeled yet.
