dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: rg
  aliases:
    - ripgrep

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: search_paths
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: pattern
        semantic:
          kind: structured_value
          context: regex
        binding:
          kind: next_positional
        cardinality: required_one
      - name: input_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
        value_constraints:
          - kind: exclude_literal
            value: "-"
    stream_contract:
      stdin_mode: data_optional
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_paths
      - kind: load_config
        target:
          kind: tool_convention_path
          path: .ignore
          convention: ripgrep.ignore_config
          purpose: tool_config
      - kind: transform_data
        target:
          kind: none

  - id: list_files
    selector:
      kind: has_modifier
      modifier: files
    parameters:
      - name: input_paths
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: ignored
      stdout_mode: path_list
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_paths

modifiers:
  - id: files
    matcher:
      kind: any_flag
      flags:
        - "--files"

  - id: config_file
    matcher:
      kind: any_flag
      flags:
        - "--config"
    parameters:
      - name: config_path
        semantic:
          kind: path
          role: config
          purpose: tool_config
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: load_config
        target:
          kind: slot
          name: config_path

  - id: glob
    matcher:
      kind: any_flag
      flags:
        - "-g"
        - "--glob"
    parameters:
      - name: glob_pattern
        semantic:
          kind: structured_value
          context: path_expression
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

  - id: preprocessor
    matcher:
      kind: any_flag
      flags:
        - "--pre"
    parameters:
      - name: preprocessor_command
        semantic:
          kind: command_ref
          dispatch: command_name
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: dispatch_command
        target:
          kind: dispatch
          command: preprocessor_command

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
  caushell.profile/known_limitations:
    - Ripgrep config discovery through RIPGREP_CONFIG_PATH and gitignore traversal is summarized as convention-backed config loading.
