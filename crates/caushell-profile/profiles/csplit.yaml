dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: csplit
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: split_file
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: input_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: next_positional
        cardinality: required_one
        value_constraints:
          - kind: exclude_literal
            value: "-"
      - name: split_patterns
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_path
      - kind: write_path
        target:
          kind: tool_convention_path
          path: xx*
          convention: csplit.default_prefix
          purpose: generic_operand

modifiers:
  - id: prefix
    matcher:
      kind: any_flag
      flags:
        - "-f"
        - "--prefix"
    parameters:
      - name: output_prefix
        semantic:
          kind: path
          role: write
          purpose: generic_operand
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: write_path
        target:
          kind: slot
          name: output_prefix

  - id: suffix_format
    matcher:
      kind: any_flag
      flags:
        - "-b"
        - "--suffix-format"
        - "-n"
        - "--digits"
    parameters:
      - name: format_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_many

  - id: options
    matcher:
      kind: any_flag
      flags:
        - "-k"
        - "--keep-files"
        - "-s"
        - "--silent"
        - "-z"
        - "--elide-empty-files"

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
    - command-frequency/D4-security-bash/weaponizable_overlap.csv
