dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: chmod
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: change_mode
    selector:
      kind: has_positional_at
      index: 1
    parameters:
      - name: mode
        semantic:
          kind: plain_value
        binding:
          kind: next_positional
        cardinality: required_one
      - name: path_targets
        semantic:
          kind: path
          role: metadata_mutation
          purpose: generic_operand
        binding:
          kind: remaining_positionals
        cardinality: required_many
    effects:
      - kind: change_mode
        target:
          kind: slot
          name: path_targets
        extensions:
          metadata_mutation.raw_operand_slot: mode

modifiers:
  - id: recursive
    matcher:
      kind: any_flag
      flags:
        - "-R"
        - "--recursive"
    effects:
      - kind: metadata_mutation
        target:
          kind: slot
          name: path_targets
        extensions:
          metadata_mutation.recursive: true

subcommands: null
extensions: {}
