dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: yarn
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: package_script_or_install
    selector:
      kind: all
      items: []
    parameters:
      - name: arguments
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: load_config
        target:
          kind: tool_convention_path
          path: package.json
          convention: node.package_manifest
          purpose: task_config
      - kind: execute_config_defined_task
        target:
          kind: none

modifiers:
  - id: cwd
    matcher:
      kind: any_flag
      flags:
        - "--cwd"
    parameters:
      - name: working_directory
        semantic:
          kind: path
          role: cwd_anchor
          purpose: working_directory
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one
    effects:
      - kind: target_path
        target:
          kind: slot
          name: working_directory

  - id: script_separator
    matcher:
      kind: any_flag
      flags:
        - "--"

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
    - command-frequency/D4-security-bash/weaponizable_overlap.csv
  caushell.profile/known_limitations:
    - Yarn subcommands are intentionally represented as package-defined task execution until a deeper package-manager schema is added.
