dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: numfmt
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: format_numbers
    selector:
      kind: all
      items: []
    parameters:
      - name: number_values
        semantic:
          kind: plain_value
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    stream_contract:
      stdin_mode: data_optional
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: from_unit
    matcher:
      kind: any_flag
      flags:
        - "--from"
    parameters:
      - name: from_unit
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

  - id: to_unit
    matcher:
      kind: any_flag
      flags:
        - "--to"
    parameters:
      - name: to_unit
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
