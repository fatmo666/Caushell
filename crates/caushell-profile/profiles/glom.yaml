dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: glom
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: transform_data_file
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: input_path
        semantic:
          kind: path
          role: read
          purpose: generic_operand
        binding:
          kind: positional_at
          index: 0
        cardinality: required_one
        value_constraints:
          - kind: exclude_literal
            value: "-"
      - name: spec
        semantic:
          kind: structured_value
          context: path_expression
        binding:
          kind: positional_at
          index: 1
        cardinality: optional_one
    stream_contract:
      stdin_mode: data_optional
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: read_path
        target:
          kind: slot
          name: input_path
      - kind: transform_data
        target:
          kind: none

  - id: transform_stream
    selector:
      kind: no_positional_args
    stream_contract:
      stdin_mode: data_required
      stdout_mode: data
      stderr_mode: opaque
    effects:
      - kind: transform_data
        target:
          kind: none

modifiers:
  - id: indent
    matcher:
      kind: any_flag
      flags:
        - "--indent"
    parameters:
      - name: indent_width
        semantic:
          kind: structured_value
          context: numeric_quantity
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
