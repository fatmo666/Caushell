dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: runcon
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - linux
  shell_families: []
  requires_features: []

forms:
  - id: run_with_context_flags
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 0
        - kind: any
          items:
            - kind: has_modifier
              modifier: context_user
            - kind: has_modifier
              modifier: context_role
            - kind: has_modifier
              modifier: context_type
            - kind: has_modifier
              modifier: context_range
    parameters:
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: privilege_modifier
        target:
          kind: none
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment: []

  - id: run_with_context_operand
    selector:
      kind: all
      items:
        - kind: has_positional_at
          index: 1
        - kind: not
          item:
            kind: any
            items:
              - kind: has_modifier
                modifier: context_user
              - kind: has_modifier
                modifier: context_role
              - kind: has_modifier
                modifier: context_type
              - kind: has_modifier
                modifier: context_range
    parameters:
      - name: context_value
        semantic:
          kind: plain_value
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_command
        semantic:
          kind: command_ref
          dispatch: wrapper_command
        binding:
          kind: next_positional
        cardinality: required_one
      - name: wrapped_args
        semantic:
          kind: plain_value
        binding:
          kind: remaining_args
        cardinality: optional_many
    effects:
      - kind: privilege_modifier
        target:
          kind: none
      - kind: dispatch_command
        target:
          kind: dispatch
          command: wrapped_command
          argv:
            - wrapped_args
          environment: []

modifiers:
  - id: context_user
    matcher:
      kind: any_flag
      flags:
        - "-u"
        - "--user"
    parameters:
      - name: context_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

  - id: context_role
    matcher:
      kind: any_flag
      flags:
        - "-r"
        - "--role"
    parameters:
      - name: context_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

  - id: context_type
    matcher:
      kind: any_flag
      flags:
        - "-t"
        - "--type"
    parameters:
      - name: context_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

  - id: context_range
    matcher:
      kind: any_flag
      flags:
        - "-l"
        - "--range"
    parameters:
      - name: context_value
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
