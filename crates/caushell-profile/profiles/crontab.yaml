dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: crontab
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: list_crontab
    selector:
      kind: has_flag
      flag: "-l"
    effects:
      - kind: load_config
        target:
          kind: none

  - id: remove_crontab
    selector:
      kind: has_flag
      flag: "-r"
    effects:
      - kind: metadata_mutation
        target:
          kind: none

  - id: edit_crontab
    selector:
      kind: has_flag
      flag: "-e"
    effects:
      - kind: open_interactive_escape_surface
        target:
          kind: none
        surface:
          kind: editor
          requires_tty: true
          capabilities:
            - run_command
            - launch_external_editor
            - write_buffer_to_path
      - kind: execute_config_defined_task
        target:
          kind: none

  - id: install_crontab_file
    selector:
      kind: has_positional_at
      index: 0
    parameters:
      - name: crontab_file
        semantic:
          kind: path
          role: config
          purpose: task_config
        binding:
          kind: next_positional
        cardinality: required_one
    effects:
      - kind: load_config
        target:
          kind: slot
          name: crontab_file
      - kind: execute_config_defined_task
        target:
          kind: slot
          name: crontab_file

modifiers:
  - id: user
    matcher:
      kind: any_flag
      flags:
        - "-u"
    parameters:
      - name: user_name
        semantic:
          kind: plain_value
        binding:
          kind: following_matched_flag
          operand_mode: next_arg
        cardinality: optional_one

subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
    - command-frequency/D4-security-bash/weaponizable_overlap.csv
