dsl_version: caushell.profile/v1alpha1
kind: command_profile

identity:
  canonical_name: info
  aliases: []

trust:
  tier: tier_a
  source: built_in

platform:
  os_families:
    - posix
    - linux
    - macos
  shell_families: []
  requires_features: []

forms:
  - id: show_info_page
    selector:
      kind: all
      items: []
    parameters:
      - name: page_names
        semantic:
          kind: plain_value
        binding:
          kind: remaining_positionals
        cardinality: optional_many
    effects:
      - kind: read_path
        target:
          kind: tool_convention_path
          path: info
          convention: info.search_path
          purpose: generic_operand
      - kind: open_interactive_escape_surface
        target:
          kind: none
        surface:
          kind: pager
          requires_tty: false
          capabilities:
            - run_command

modifiers: []
subcommands: null
extensions:
  caushell.profile/source_research:
    - command-frequency/cross-validation/COMMAND_PROFILE_COVERAGE_PLAN.md
